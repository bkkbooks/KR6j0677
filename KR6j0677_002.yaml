body:
  text: 吳興沙門仁嶽述起第二卷二明性無生滅分三一密請經願聞下孤山云阿難但合掌禮佛而默有斯意故至結集得備敘之所以不發言者以屢扣佛慈亟承指誨內慚暗短未識大方欲更興言未得機便以師嚴道尊理非容易者也後因匿王疑斷滅致問如來以不生滅為答遂承佛語方得陳辭美哉聖人等斯令範二時下顯示為三一匿王陳疑注具云下纂要曰迦羅鳩陀此示牛領迦旃延此云翦剃刪闍夜此云正勝毗羅胝此云不作自然得道者如於高山轉縷丸縷盡自止每渡河氷者述征記曰北風徑河氷合要須狐行云此物善聽氷下無聲然後過河經證知此心者問前言此身今云此心者何耶答外道謂身死斷滅蓋由心滅匿王既聞佛斥生滅遺失真性是知若得真性則無生滅故此間心即是問身下文信知身後捨生趣生必亦信知心無斷滅斯亦善權助發機教耳二佛告下如來示性又二一示身有遷變二示性無生滅初又二一審肉身變壞二佛言下審顏貌遷移經孩孺者谷響云孩或作咳禮曰子生三月執右手咳而名之釋名云兒始能行曰孺子孺濡也言濡弱也頽齡謂頽毀之年也注古者謂年齡齒亦齡也文出禮記耄惛忘也者此依禮記注又釋名曰耄頭髮耄耄然也經剎那至不得停住仁王云一念中有九十剎那一剎那經九百生滅注時之極少者準俱舍有三極少頌云極微字剎那色名時極少論曰分析諸色至一極微為色極少分析諸名及時至一字一剎那為名時極少如壯士一彈指頃六十五剎那二佛告下示性無生滅為二一示性二斥邪初又二一顯身性不滅上文所觀剎那不停但是小乘生滅細相尚未及偏真之理況圓中之性乎故佛問不滅而王答不知二佛言下指見精為證又二一審觀河無異經恆河者應法師云或言恆伽或作殑伽舊譯為天堂來見從高處來故此河從雪山頂無熱惱池東面象口而出流入東海擕者廣雅云提挈也宛然者荊溪云邊高中下邊下中高皆名為宛顯了可見故也二佛言下顯見精無常注言偏意圓者佛意雖圓機緣未會故匿王所領且存偏解耳抑語辭也二而猶下斥邪注具云下珙鈔曰末伽梨此云不見道拘賒梨此云魔彼之三者一富蘭那迦葉二阿耆多翅舍欽婆羅三尼揵陀若提子三聞下大衆得解注主伴同置猶止也此且約佛與王俱未顯談生滅即不生滅故曰同置應知王若顯談則無由發起阿難後問秪由王解身有生滅性無生滅與阿難云我頭自動見性不動其理似同是故下文對前為問三阿難下辨惑分二一惑問經若此見聞者據經現文但應云見又云聞者相帶而來以聞性與見性同故注私謂下明對機之意也身境者身謂我頭境即佛手破當體之妄者如云云何汝等以動為身以動為境等此斥阿難認物為己名為失真也顯所依之性者夫當體之與所依猶波之與水必不相離由當體既動難為指示故寄見精以顯所依也當體故不即謂前破當體猶存不即之義所依故不離謂次顯所依欲彰不離之意應知下明互有得失阿難何嘗為失此約性也匿王亦未為得此約解也如云信知身後捨生趣生等二即時下辨示又二一現相略示二興慈廣辨初又二一現相表法二就法問名初又二一以輪手審其倒正經世間衆生下孤山云阿難以前立義屢遭撿責故今答佛正倒不敢言己唯指衆生二告下以倒正比於迷悟經一倍膽視沇疏云此明垂手是正以順身故竪臂却倒以不順身故世人以倒為正以正為倒故云一倍今謂不然阿難雖指世人其實己見亦爾豈陳正倒雖此反常耶順與不順夫何所據請從孤山釋之則知汝身者前文所斥遺失真性顛倒行事正由以動為身故今所示復言汝身也二隨汝下就法問名又二一問名二于時下昧旨經瞪矒至不瞬谷響云此失措之狀也瞪直正反定目直視也矒莫宜反目不明也瞬亦作眴目動也注認悟中迷為身為心者以經云不知身心顛倒所在故斯蓋阿難雖知見性不動然猶未絶能見之情故今因佛問身顛倒乃與大衆俱昧兩端由是下文皆約身心廣辨真妄二佛下興慈廣辨為二一顯真心二示倒相初又二一舉昔說注喻以海潮者海有八德潮不過限此其一焉總有五法下一百法也具如彼論今文所列少不次第節疏云八識心王識心王識自相故五十一心所識相應故十一種色識所變故二十四不應識分位故六無為識自性故攝所歸能攝相歸性故言唯心所現此依法相宗釋也若約山家諦境明之所現之法不出十界百如三千世間俗諦之境也能現之心即三千真中之理也然此文意大同初卷云如來常說諸法所生唯心所現前記已備學者思之二汝身下顯今法二云何下示倒相又三一總訶注示所迷三諦者理具俗性開成三諦性本無相實唯真中珠具衆寶喻意可識今既不達名悟中迷者衆生不達真心是在諸佛悟中而迷也或指本覺之性名之為悟於覺不覺名悟中迷觀其經意當取前義上文云如來之身名正遍知汝等之身號性顛倒下文云汝等即是迷中倍人如我垂手等無有異故知迷悟約生佛對論耳二晦昧下正示又二一法注又空謂下上約理惑相待變起頑空則以無明為因而生細相也下約心境相由變起色等則兼境界為緣而成粗相也妄想者即四住煩惱驗前晦昧即根本無明也五陰備矣五陰是實法衆生是假名假實相依猶如形影故今言身而不云衆生下云衆生而不言身也妄想四心者受等四陰也是知下荊溪云自法華前藏通三乘俱未稟性二乘憚教菩薩不行別人初心教權理實以教權故所稟未周故此七人可云無情不云有性孤山據此故通斥言九界妄心豈信草木等二譬如下喻三汝等下結斥注迷悟相翻此約一重為倍也迷中更迷即約兩重為倍也若觀前文首尾相換一倍瞻視誠如孤山所說若銷今文迷中倍人如我垂手有似真際之義是故兩存儻如資中云垂手是正世人以正為倒何故如來偏用垂手喻迷中倍人耶當知須將垂手為倒以況於迷並通圓節二師所解縱約兩重為倍不應更難法喻不齊也二阿難下遍歷緣塵簡非顯是分二一略簡緣塵之心二廣簡緣塵之見初又二一疑請經允所瞻仰允信也所瞻仰即法音也法音由金口而宣故帶瞻視而仰聽焉二佛告下簡示又二一簡所緣之法二簡能緣之心初又三一法二如人下喻經以所標指者若依常塗解能所義能猶此也所猶彼也應以指為能標月為所標今言所標即能標耳如云所生父母不可以常義例之注引圓覺其意亦爾三汝亦下合二若以下簡能緣之心為二一正破二結斥初又二一破緣聲二例緣色初又三一法注私謂下恐人謂前遺所標之指但遺能詮之教今破分別方破緣心故引阿難所疑以明喻意須知前喻意在今法故上文合法從略而辭見於此耳二譬如下喻三此亦下合二斯則下例緣色經聲分別心謂聲上分別之心也若取義便應云分別聲心分別我容者以前阿難言現以緣心允所瞻仰故例破之二如是下結斥又二一結屬邪宗注二十五諦谷響云外道迦毗羅此云黃頭頭如金色故說經有十萬偈名僧佉論此云數術用二十五諦明因中有果計一為宗言二十五者一從冥初生覺過八萬劫前冥然不知但見最初中陰初起以宿命力恆憶想之名為冥諦亦云世性謂世間衆生由冥初而有即世間本性也亦曰自然無所從故從此生覺亦名為大即中陰識也次從覺生我心此是我慢之我非神我之我即第三諦也從我心生色聲香味觸從五塵生五大謂四大及空塵細大粗合塵成大故云從塵生大然此大生多少不同從聲生空大從聲觸生風大從色聲觸生火大從色聲觸味生水大五塵生地大地大藉塵多故其力最薄乃至空大藉塵少故其力最強故四輪成世界空輪最下次風次火次水次地從五大生十一根謂眼等根能覺知故名五知根手足口大小遺根能有用故名五業根心能遍緣名平等根若五知根各用一大謂色塵成火大火大成眼根眼根還見色空塵成耳根耳根還聞聲地成鼻水成舌風成身亦如是此二十四諦即是我所皆依神我名為主諦能所合論即二十五也數論外道者證真云拘舍離是自然外道今經云昧為冥諦非斯人所談故長水云是彼類耳二離諸下斥非常義經各有所還者如下文八種還相云何為主者復假前喻斥非亭主常住之義也二阿難下廣簡緣塵之見分二一約緣塵正簡見性二約見性廣破執情初又二一相待簡二絶待簡初又四一明還不還二明物非物三明遍不遍四明是非是初又二一疑請二佛告下簡示又二一總示注觀河之見即見無童耄也雖異緣塵即分別之性也而猶是妄者以能見未亡故真心無朕者朕兆也郭象注莊子云朕迹也應知此見下問此異孤山所說耶答非異也但其言略故重明之諸家並以三義解之者唯疏疏云如人揑目見有二月一是本月二是假月非是月影者不取水中之月為第二月也疏公雖不用三義然解影字之義誤矣唯配法有異者真際云真月似圓成二月如遍計月影則依他長水云第二月揑目所觀全體虗妄堪喻妄見本不可得水中月影從真月降可喻妙應感而遂通今謂以水月喻妙應雖金光明有之用釋此經塗浂遠矣二阿難下別簡又二一緣塵可還二見性不還初又二一示塵相經𡋯者𤇆塵之貌或作㶿者非氛孚云切又音焚祥氣也二阿難下還本因經緣還分別者緣是所緣之境分別是能緣之心餘七所還俱還前境唯此所還則還自心良以心非境而不存境非心而不立是故緣謝由分別不生故曰緣還分別應知此緣若於明等起於分別明還日時即緣還分別也暗還黑月等莫不皆爾二汝見下見性不還又二一顯性二諸可下警悟經不汝還者非汝而誰正示見精元也則知汝心本妙明淨例顯妙精明心也注若離業識則無相者因無明故而有業識由業識故乃有轉識轉識即能見相也是知無明若破業轉俱亡三汝自下斥迷二阿難下明物非物又二一疑請二佛告下簡示分三一示緣塵二簡見性三破執情初又二一泛明見境廣狹經無漏清淨者近謂四果遠謂圓真據理而言唯圓無漏得真天眼阿那律如圓通中解注舊翻難分別等此依淨名疏釋纂要云菴摩羅舊譯云奈誤也此果華多子少其葉似柳而長尺餘廣三指果形似梨而底鈎曲經諸菩薩等等取緣覺智論明支佛天眼亦見百千世界不過分寸者沇疏云如隔皮膚不見五藏等孤山云比對聖人言其近也二阿難下正示緣塵留礙二汝應下簡見性又二一定自他二阿難下擇物見又二一擇物經從日月宮下谷響云日月與四天齊俱在須彌半腹但日月處空耳七金山圍繞須彌其山中間各有香水海高下齊四天草芥者楊雄方言云蘇芥草也江淮南楚之間曰蘇自關而西或曰草或曰芥二阿難下擇見性注見性似在於內者性實非內以前來所說皆附能見之性而示故云似內也真性必因於外者華嚴云法性遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可得肉眼所見者阿難前見初禪雖是天眼蓋承佛力今約自力言之故云肉眼是故下文推而破之者節疏解前文我雖識此見性無還云何得知是我真性謂阿難意望世尊指彼真性同諸物象分別顯現斯乃執真有相矣尋下破意其理可知今謂節公明執意大早觀前文勢且無厥由圓師用之豫實不韙二若見下破執情又二一破物見經吾不見時何不見吾不見之處資中兩釋初同孤山次云若同吾見吾見無相名不見之處汝何不見若見不見自然非彼不見之相者資中初釋亦同孤山次云若能見吾無相之處能見已成見相自然非吾不見之相已上二節經文沇疏皆作兩釋彼自判云前解為正證真云前約緣事境而說後約緣真理而談然其前解甚合經旨自然非物者此且一向作真見離物示之至下明是非是中方顯見物非即非離不成安立者約諦言之安立即俗諦也若非安立即真諦也夫俗有差別真無差別今雖欲顯無差之性而約差別破之者以阿難能見所見差別未亡將恐認俗為真是故約俗而破二阿難下顯真性經若汝見時是汝非我指見精也見性周遍非汝而誰示真性也前私謂云此寄見性之遍以顯真性之遍豈不然乎云何自疑下此責阿難言云何得知是我真性三阿難下明遍不遍又二一疑請經娑婆者谷響云亦言索訶此翻堪忍悲華云是諸衆生忍受三毒及諸煩惱故名娑婆廡音武說文云堂下周屋也釋名云大屋曰廡二佛告下簡二譬如下喻三若如下難谷響云挽謂牽挽也續迹或作竇迹之誤四一切下斥二若能下示性遍孤山於此約六即明義從名字已上皆能轉物是則有名字如來乃至空竟如來云云注理事雙顯體用備陳者如來藏唯妙覺明即理體也圓照法界即事用也一為無量無量為一等義例可知四阿難下明是非是又二一疑請注前既難破即體性紛雜不成安立等二佛告下簡示又二一如來示性二經家敘相初又二一約見精定其方所二且令下約方所簡其是非又二一約離義簡物是見二約即義簡物非見初又二一歷緣審見請二佛告下如來顯示為二一示菩提本絶緣見二斥妄想令出是非初又四一法經十方如來下此約果人所證以示衆生所迷上證雖殊見性是一及大菩薩即迷圓住已上也注見謂下兩釋當取次釋為便以根境識三宛如次第故前文云分別之處則復見緣正是以境為緣也十八界如法界次第經元是菩提等第四卷云性覺妙明本覺明妙即此中菩提之體焉二明文殊下例又二一問二如是下答經若有是者則二文殊節疏云若立二身即有是非之相既唯一體終無對待之名此喻真本無妄也乃至長水亦以是非解二文殊請詳私謂自見藏否三佛言下合經此見妙明與諸空塵指阿難所迷之境也亦復如是總合前例本是妙明下別示真妄應以真合文殊妄合是非二相但文隱略耳四如下喻二是以下斥妄想令出是非注物為所指者如云但可有形無不指著見非可指者如云必無見精受汝所指二阿難下約見性廣破執情分四一破自然二破因緣三破和合四破非和合初又二一疑請二開示初又二一約濫彼邪外故生疑經投灰等諸外道種纂要云外道苦行宗計有十三種涅槃云有五百外道在恆河邊常以灰塗身佛往彼浴亦以灰塗身外道見而喜曰瞿曇亦同於我而不全說無我世尊為說真我具八自在外道因而發心二世尊下約違昔因緣故致請經彼外道等常說自然者如末伽梨計衆生苦二隨見破執初又二一歷緣二若必下審見二阿難下隨見破除執又四一正破二汝可下重詰三阿難下申答經有兩節初答前正破次世尊下答前重詰如佛所說即披剝萬象析出精明等四佛言下印成二佛復下約即義簡物非見又二一牒前復問文有四節初牒前答重詰義二則汝所指下牒前答正破義三今復告汝下總案定兩重答意四汝又下正設今問二阿難下據問申答又二一申答二佛言下印成注則此見性宛如空華者以阿難妄認物象為見性故二於是下經家敘相又二一大衆惶悚經非無學者擕李云非小乘無學孤山云非圓真無學今謂二說並通若依擕李則三果已還通惑尚在迷中既重故有茫然惶悚之狀此據多分而言也若順孤山則別教已還未破別惑俱有此相然應不無輕重優劣之異此約全分而說也二如來安慰經變懾者變易懾也如所如說即智論云如法相解如法相說也注如來有五語下引金剛般若釋之彼無不妄此無不異若會通者由不妄故所以不異二是時下絶待簡為二一文殊發起二如來顯示初又二一敘疑經法王子者荊溪問曰經稱文殊為法王子其諸菩薩何人不是法王之子答有二義一於王子中德推文殊二諸經中文殊並為菩薩衆首非是疇昔善根輕鮮者疇語辭也意云大衆驚怖乃是宿植深厚聞佛所說將破無明故有是相耳二惟願下致云一空二根三明四境五作意六種子七分別八染淨九根本若加等無間緣則成十也今經云因心即分別緣因眼即根緣也二佛言下隨情正破又四一申昔義二破執情又四一定二阿難下難三阿難下並四若復下結三是故下顯真性又二一簡緣顯見經四義成就長水云四境自屬前塵見性未曾生滅雖見四境而非四境成就於見譯人巧略故別列而總結也若欲經文當句中具者應云見明之時見非是明成就等今謂此解非但銷文不便抑又釋義全疏若當句中須云成就者是則下文亦合云見見之時見非是見成就語既相類何無成就之字耶此銷文不便也原夫佛意既破四緣俱非見性欲顯真性亦非能見故先牒能見以離四緣即見明之時見非是明等後約真性以離能見即見之時見非是見若依長水則失兩重倫次之美此釋義全疏也谷響云四義成就是結上之辭請從斯解二汝復下簡見顯真注映色之性者第四卷云由明暗等二種相形於妙圓中黏湛發見見精映色結色成根今言性者即眼根中能見之性也性脫于見方名見見者問見見之時為屬何位答沇疏謂前離緣塵是相似位即別教三賢圓教十信也引唯識頌云現前立少物謂是唯識性以有所得故非是住唯識今離能見是見道位即別圓地住已上也引頌云若時於所緣智都無所得離二取相故真實住唯識今謂亦應約圓教六即明之從名字即以解為見乃至究竟即以證為見更有異說謂諸疏鈔或後人所談也集解中非掩彼之長衒己之短嘗委尋諸說釋此文相意所未安然而人情不同取捨各異但恐淺昧未曉其深故云余佛能知也四云何下垂訶誡二阿難下破衆生顛倒為二一敘迷致請注中真際長水二解不同左右觀之各有其美孤山亦用節公所釋惟後賢擇之二爾時下興慈廣說又二一總告二阿難下正說又三一標業示見注不可以常途二業相配者如云別業屬前六識同業屬第八識或言別業感正報同業感依報等今不取者以下文同別二見皆指現前妄識所見依報之相故二云何下方喻合明為二一引喻二合明初又二一喻別業妄見二喻同分妄見初又四一喻二於意下破又二一定二阿難下難又二一難因緣經此若燈色下破因生也若是見色下破緣生也又燈色是自生見色是他生若和合義後文自破故此不論二復次下難自然三是故下結注譬圓初心下此約解論也若沇疏云證真之時了知遍計脫體全空故云見眚非病此約證說也真際長水皆作兩釋但筆語有殊耳然孤山引大經為證於義似親故不取他說四如下例又二一指揑月經第二月非體非影資中云非是月體又非水中月影真際長水等俱同此說前佛釋見精明元如第二月非是月影曾引此文證之謂影即二月也今以向之燈影唯青之觀例同月影揑所成示不由因緣自然而然耳注畏無我句者外道所計不出四句謂有無雙亦雙非此屬無句也二佛告下開示又三一斥前疑二阿難下責自體三阿難下破執情注興福下先設問辭云慶喜所疑唯約真理者此據前文云覺緣遍十方界湛然常住等然一體下答也既興能計必有所緣者識哉是言也當知阿難言雖涉理心未亡緣況疑自然濫於外道豈無所緣之相乎問前疑覺緣濫於冥諦及以真我如來何故但破自然耶答阿難云我今觀此覺性自然即是觀前覺緣之性所言遍者亦是自然遍也故知對他相濫雖有三名自己所疑秪是自然自然若破冥諦真我復何濫歟二阿難下破因緣為二一因緣各破二因緣同破初又三一轉計重詢二佛言下隨情正破又二一破因二破緣初又二一定二阿難下難二復次下破緣又二一定二阿難下難注因親緣疏者如因明有見則境親而根疏若緣空有見則根親而境疏因緣皆對境破不對根破者以境有明暗空塞推撿為易根無此相故不論之又則阿難見性未脫前塵由於前塵而生轉計如上文云汝今因見見性現前等是故所破並從境說三當知下示性通訶經精覺妙明下示性先簡非次顯是汝今云何下通訶有法有譬戲論名相總合因緣自然二執二阿難下因緣同破又二一破世間因緣二破衆生顛倒初又二一據昔重疑注唯識明九緣谷響故文甚顯著無勞致疑二此亦下例眚燈二云何下喻同分妄見注孟康下谷響云唐賢顏師古注漢書多引先儒孟康張晏皆師古所引今全取彼注以釋經文皆曰旁氣者謂暈適等皆氣也如淳曰暈讀曰運適如字或引禮記適見於天日為之食乃作謫音者非也今云適自是黑氣耳如玉玦者如環而有缺也除舊布新者此本左傳申須之辭張晏引之也孛氣似惠者釋名云言其氣孛孛然似掃惠也惠即掃帚妖星之狀似之飛絶跡而去等者此乃星說之文孟康引之耳星說云自上而降曰流自下而升曰飛又云光跡相連曰流絶跡而去曰奔珥形點黑者以其黑點似珠在耳也虹霓者通占曰陰陽之氣和則為雨怒則為風雷妖氣擊作散為虹霓二阿難下合明又二一總標注將同例別即進義也以別例同即退義也由前別業光明同分後說故得進退之名二阿難下正明為二一明別業二明同分初又二一法喻對辨二法喻合辨初又二一指喻二例法前私謂目眚見燈之喻正欲引例阿難目觀山河等皆是妄見其文在此二見所下法喻合辨又二一正辨經此實見見者應有二義一約真見簡非妄見此則通取解證俱名見見二別約真證而見簡非似解而見注此即重破因緣自然者如破別業妄見中二科是也二是故下結示二阿難下明同分又二一合例同別二喻經瘴惡者瘴是惡病之氣俱是無始見妄所生者此非邈無萌始即指現前見妄無其始因也二例下別例同分諸法三若能下指迷歸悟經諸和合緣及不和合者問此云和合與上文和合之義同耶答同也但上文雖說和合而未破其計故下文破之問不和合應是自然耶答如注文三阿難下破和合為二一結前生後注中真際長水既於前文兩解有異故今銷文亦復不同二阿難下牒疑正破又二一牒疑經前塵者即明暗通塞也汝今下正牒所疑證菩提心證猶悟也二則汝下正破又二一破和二破合初又二一通定二若明下別難又二一難明緣經若非見者下此由上文云見相可辨雜何形像恐計者於可辨處起即離之見成相雜之義故先破離義次破即義必見圓滿下又因上文作即離而破復恐計云非即非離但是見之與明性皆圓滿所以相雜故相對破之見必異明下若更執云雖各圓滿而不妨見異於明共成雜義是故破云雜則失彼性明名字等沇疏云如微塵與水相和但名泥團不名塵水二彼暗下例餘境二復次下破合又二一通定二若明下別難又二一難明緣二例餘境四阿難下破非和合為二一轉計注中論破計者彼偈云諸法不自生亦不從他生不共不無因是故知無生初破自然即無因者亦可屬自性次破因緣雖通三性正破於他和合及不和合共成四句若爾則闕無因義應以自然兼之此與注文不同兩取無咎然則非和合義亦從自他開出者蓋其性中離立其義不同自然唯執理體故也二佛言下正破又二一破非和二破非合初又二一通定文中總舉和合別定非和二若非下別難又二一難明緣經必有邊畔者說文云畔田界也左傳云如農之有畔二例餘境二又下破非合又二一通定總別例前二若非下別破又二一難明緣經云何甄明合非合理者此對前合義責今非合也注角謂隅者亦可角謂獸角乖是背義如牛二角生則相背二例餘境二阿難下會破陰入明法空分二一破四法二破七大初又二一示法本真經諸幻化相智論云譬如幻化象馬及種種諸物雖知無實然可見聞注剎那不相到者一剎那間即生即滅無前無後是不相到故楞伽云一切法不生我說剎那義初生即有滅不為愚者說二乘非不破法者藏通二乘修析體觀亦破五陰實法小菩薩義同二乘故不別說菩薩非無有我者界外人執也無明未盡但有我見故涅槃中迦葉菩薩云我等今日之前悉名邪見是也一往分配斯亦可然者以古師並云小破人執大破法執蓋言二乘未得涅槃法空菩薩已得界內人空耳法執例然謂上界外惑亦不可以二乘思惑為類也對愚根別樂各有三者谷響引俱舍頌云聚生門種族是蘊處界義愚根樂有三故說蘊處界且愚三者一愚心為說五陰則開心為四合色為一二愚色為說十二處則開色為十處半謂五根五塵及法塵少分合心為一處半謂意根及法塵少分三愚心及色為說十八界則更開心為七界半謂六識意根法塵少分皆言愚者迷也根三謂上中下樂三謂略中廣皆如次配三科果有三身因理含攝者衆生心因具三佛性即含攝三身也無二邊相者圓師以去來迷悟生死三雙為二邊相二阿難下依真破妄為四一破五陰二破六入三破十二處四破十八界初又二一總牒二阿難下別破又五一色陰乃至五識陰初又二一以喻顯妄二即喻破執初又二一喻經瞪以發勞埤蒼云瞪直視也狂亂非相者長水云或見毛輪第二月等注現九界色者且約迷說佛界因果非無色陰以了色唯心故不言之二色陰下法經亦復如是此須兼帶上下文相顯之方見其義上文既以狂華喻於色陰下文云是諸狂華非從空來等正喻色陰不從因緣等生也以能喻之文既委故所喻之法甚略說在中間其語巧妙也後四陰例此可知二阿難下即喻破執又二一破經非從空來破他性從非自出破自性約法言之應以心境而分自他餘四陰皆有自他二義蓋四性中存略而破也唯行陰中有離自他義似破無因性問經破人法二執何故須破四性於四性中多破自他二性耶答荊溪云四性為諸見本自他復為共無因本所以然也故龍樹尊者為被末代人根轉鈍廣作觀法造於中論實以推撿四性為本正順今經最後垂範願說經者無忽繁文如是阿難者先指定前義再召而破之餘皆放此翳者廣雅云障也奄也二是故下結注則顯色陰本如來藏者以前總牒云何五陰本如來藏故知結意雖則簡非正顯前義二阿難下受陰乃至識陰科節同前經譬如有人手足宴等竦疏云且以近事以況遠旨亦是法亦是喻譬字即半含喻也今謂若爾豈唯受陰前色陰剩及下想陰等並言譬如皆可云以近況遠應知此中雖帶事說意在比況耳至六入去雖有譬字正約事相而破也忽如忘生者有作妄生字之誤也證真云忘生猶言忘形也謂百骸調適不與若苦樂憂喜諸受相應恬然靜住似無形命然李陵與蘇武書云每一念至忽然忘生文選注云忽然不知生之有生今譯者蓋用此語但改然作如也談說酢梅口中水出者世說云魏武帝行失道三軍皆渴帝令日前有大梅林饒子甘酸可以解渴士卒聞之口皆水出注二相若殊俱應現在長水云如樹生果果不是樹二俱現在今且不然經若離空水此似無因也用餉他國者餉饋也以鉼擎空如器貯食往饋他國也注猶業持身識而去者中陰生陰皆有色心並由業力之所任持也問真際謂塞其兩孔喻六七二識我法二執塞二空理長水云死有至時諸根不通如塞兩孔二說然乎答凡立譬喻有全取合法有分取合法今但分取合其大義恐傷曲說吾未敢然起第三卷二破六入為二一總牒夫六入者凡有二義一根境互相涉入二根境俱為識之所入是故諸經名十二入今經唯以六根為六入者蓋根有勝義親能生識又根能受境吸舉前塵故偏名入下文云六為賊媒自劫家寶金光明云六入村落結賊所止皆此義焉二阿難下別破分六一眼入乃至六意入初又二一指事喻妄注斯取前文能喻之根便為此中所喻之法者問若爾此中以何為能喻耶答同是菩提瞪發勞相即能喻也然此能喻帶法言之菩提即覺從覺生妄如瞪發勞經意云彼色陰中所說目之與勞亦是覺明瞪發勞相勞相即空華也應知前文空華遍喻九界五根之色此中空華但喻九界眼入之相前寬此狹不可混同塞耳聞聲等例亦如是者例如勞目皆易解之妄事也沇師所解於義不然者以將所喻作能喻解故二因于下從妄破執又二一示妄性經二種妄塵者前指勞目且據明緣示其妄相明必對暗相待而成此見離塵既無實性則一切眼入皆同虗妄耳等諸入義例咸然講者至下須明此意二如是下破執情又二一破經非於根出證真問曰此中本破其根今何得云不從根生若然者與破識何別答今言根者但指自體以自望自如言諸法不自生即斯義也今謂不然上云見性下云聞性乃至意入名覺知性性即識也若非識者豈可諸根未發識時已有見聞之義耶應知破根而推識者以現前六根生滅難見故從諸識推而破之識各不生根云何立譬如草木之根能生枝葉方名根耳枝葉若死知根已枯以喻觀法大意可見問若爾但破十八界於義即足何須遍破六入十二處耶答蓋隨所計實法有異故分三科至論推破必須三事相兼而說所云以自望自殊無所以長水云亦可勝義望世俗根故云根生更增他味也不於空生者證真以此句破無因生前非於根出破自生非明暗來破他生即成三句若合自他為共性者四句意也問前五陰中記以空為他生今證真何故以空為無因耶答凡四性之義隨文分別不可局定前文空外無別他性之義故得以空為他蓋虗空亦是眼根所對之境今文既有明暗之說可對他生空對無因於義甚便二是故下結二阿難下耳入乃至意入科節同前注非取比況之義者然譬喻二字一往分之如法華疏以比況為譬曉訓為喻若通言之如說文中譬即喻也今從通義故不取比況往人者自興福至長水也乃謂下擕李之說今經了華靜亦名聞等為顯性常故下文云聲於聞中自有生滅非汝聞性為有為無了義著矣經急畜其鼻畜猶縮也通塞虗實者通塞對塵虗實在根根虗則塵通根實則塵塞離合違順二塵者身與境合有違有順順對細滑違對粗澀不與境合故名為離二塵即離合也經非離合來此破共生以離亦對塵故非違順有破他生不於根出破自生又非空生即無因也注落謝五塵者阿毗曇名無表色亦云不可見無對色眼等五根但緣現境者百法疏云前五轉識五塵為境是現量故緣實非假實謂青等假謂長等流入五根不及之地者資中云眼耳取外塵境剎那流入意地從外入內名為迸流至第二念緣之不及故云流不及地雖通兩釋者前是孤山新義後即資中所解真際長水意同沇師經非寤寐來破共生非生滅有破他生不於根出破自生空生如前三復次下破十二處為二一總牒二阿難下別破分六一眼色處乃至六意法處初又二一指處審情二阿難下隨情破執又二一破經誰明空質者語似推人意存破法即眼根也然此中破處還復破根者以根如揑目色如空華揑若不生華則隨殞乃至法處例此可知二是故下結二阿難下耳聲處乃至意法處科節同前經旃檀者一云此方無故不翻或曰義翻與釋論云一切香木中旃檀為第一一銖者谷響引律歷志云二十四銖為兩今云一銖其少也注如法華下引證香有勝力又張華博物志云有西國使獻香者漢制不滿斤不得受使乃私去著香如大豆許在宮門上香聞長安四面十里經月乃歇又任昉述異記云千年松香聞於十里亦謂之十里香注五塵及以虗空攝一切法者問法有二種一心法謂相應諸心數法二非心法謂過去未來色法等是則五塵等外更有心法今何以云攝一切耶答此中為破法若非知須屬五塵及以虗空故云攝耳若是心法自屬上文所破也四復次下破十八界為二一總牒二阿難下別破分六一眼色識界乃至六意法識界初又二一指界審情二阿難下隨情破執又二一破注不可見有對色者非青等色故不可見能照境發識故可對此是勝義根非浮塵根二種根如第四卷解經又一切味下以根從境破識體若一下以境從根破又汝識心下長水云識心第八也思量第七也了別第六也七八二識但第六根亦同名意今謂不然經文前後此指阿難現前第六識心破其情執秪可取俱舍小宗釋此三義況將七八同名第六於義甚疏又則七八是住地菩薩境界非今對破阿難之意注集起名心等天台用此為覺意三昧所觀之境故止觀云對境覺知異乎本石名心次心籌量名意了了別知名識云云婆沙下彼論問曰心意識此三何別答或別不別言不別者心即意識如火名𦦨亦名為熾亦名燒薪秪是一心有三差別言有別者名即差別或云過去名意未來名心現在名識或云在界名心在入名意在陰名識等上引俱舍釋今經義亦約不別而別分此三名也經世間諸法不離五塵者問前意法處推所緣法則云此塵非色香味等今何故取五塵為法耶答前文正推法處故對落謝五塵言之此中既破意識須對現前五塵而說以五意識從現境生故非意所攝者此據意法斥之言五塵之法自屬五根所攝非意家法入之分也注例前可知者應云若意法共生合則中離則兩合體性雜亂云何成界二阿難下破七大為四一疑請經皆因四大和合發明者此疑實法和合不同前文覺元和合應知四大有內有外內謂正報外謂依報前五陰中色必具四大一往通內外二往唯在內下七大中地水火風一往通依正二往唯在依空大對四皆屬於境并根與識還是重破三科之法聖言被物各隨所宜得益不同故茲異說耳戲論者谷響云謂同兒戲言論而無實理也二爾時下訶誡經如說藥人喻多聞真藥現前喻義諦三阿難下承旨四阿難下正說又二一牒疑總非注此破阿難不和合疑即上文云云何如來因緣自然二俱排擯也今所破者體兼真俗即上文云大性是也阿難唯執世諦蓋據小宗如來兼破真俗斯約大義以真如是萬法由隨緣故萬法是真如由不變故二汝觀下約性別破分七一地大乃至七識大初又二一破妄二顯真初又二一立析法觀境經汝觀地性者此指析法差別之性也下水火風等皆是俗諦性耳前云若彼大性則指四大之中真諦性也隨文釋義不可混同如地持中有二法性一事法性性差別故二實法性性真實故注有方分微至無方分微者證真云諸瑜伽師作析色明空觀以假想慧刀分析塵色至一微塵此塵猶有東西南北四隅及上下方分但名微塵不名極微更析此塵以為七分即無方分名為極微對法等論呼為極略色至此方名色邊際也以不可析故若更析之即成虗空故名鄰虗經中言析彼極微者乃通相呼微塵為極微也二阿難下破和合妄情經若此鄰虗等將欲破之先且立之汝今問言等重牒前執汝且觀此下正破妄情以小乘所迷諸法如幻當體無生故遭合色合空等難二汝元下顯真又二一示真性注此言理具非關事造谷響云理具如摩尼具寶事造如摩尼雨寶理具如水具波性事造如因風起波若不具寶性餘珠應雨寶若不具波性大地應起波是故一家明圓必談理具深符佛旨妙得自心若說若行皆須了此隨染淨緣者谷響云九界高下通名妄染五即聖賢總號真淨以圓五即通為佛界故也順差別業者以順釋循漢書云因時循理注曰循順也二世間下斥邪說注世間通指九界者別而言之多指人天已上別教菩薩已還以謂識心分別計度因緣自然等此如初卷中云諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬二阿難下火大為二一破妄二顯真初又二一立妄境二破執情初又二一示因緣經陽燧古文作鐆應法師云五石之銅精也圓以仰日即得火注火方諸者出火珠也非今經意窪俞短切器空中也二阿難下例和合經婆羅門者應師云此訛略也具云婆囉賀磨拏義云承習梵天法者其人種類自云從梵天口生四姓中勝唯五天竺有餘國即無諸經中言梵志亦此名也注例和合義者問破七大中何故唯此火大例和合耶答前地大和合義疏其執易破從火洎識和合義親所計難破且如火性以俗諦觀之灼然因于鏡日艾三和合而生今以衆人和合詰其根本各各不同用顯諸法和合皆是虗假都無真實火大既爾須將此義貫下五大亦復如是所舉舍利弗等三人且欲例同鏡日艾三也水風等三隨義可解瞿曇星名者此依南山解也若慈恩云釋迦之郡望也應師云此翻為最謂除天外人類中此族最勝故二阿難下破執情又二一審二阿難下破經日鏡相違資中云日去人間四萬踰繕那一踰繕那二十里也二汝猶下顯真二科可見三阿難下水大為二一破妄二顯真初又二一舉事審情注方諸見月則津而為水論衡云十一月壬子日夜半時於北方鍊五方石為之狀如杯盂向月得津此與高誘注別二阿難下隨情破執經皆同滔溺者乙咸乙陷二切破水沒也有作滔及陷者字之誤二汝尚下顯真二科可解四阿難下風大科節如前經僧伽梨此無正翻義云雜碎衣以條數多故若從用為名則曰入王宮時入聚落時衣慧上菩薩經謂之大衣注袈裟從色得名者此是不正色亦云壞色南山業疏云本作迦沙至梁葛洪撰字苑下方添衣言道服也五阿難下空大為二一破妄二顯真初又二一舉事審情經空性無形因色顯發沇疏云虗空與色二俱是假亦相因有體不離色故小乘以明暗為體大乘以空一顯色及極逈色為體上見空名顯色下見空名逈色孤山云凡夫妄執或謂空是色等如涅槃迦葉品破之或引法相謂空是色全背經宗今為資中救之此經空大先立後破涅槃虗空亦復如是何以明之彼經佛說衆生佛性猶如虗空此即立也迦葉乃以虗空對於四大謂空是有故佛以一十復次而遮其非意恐衆生認所喻之性同能喻之空此即破也今言空性無形者蓋云無依正之形耳而亦因依正之色顯空大之相故云因色顯發斯則正取涅槃能喻之空非無色也故下文鑿井得空乃是逈色之類況前文云縱令虗空亦有名貌下文云見覺空頑等然則頑空豈無色耶應知今經說空為大者以明迷妄有虗空依空立世界又言發真歸元此十方空皆悉銷殞是故次四大後須說空大此先立也至下文作三句推之方是破也孤山用涅槃破義解此中立義仍斥沇師全背經宗者誤矣注剎帝利等四姓全依西域記釋谷響云剎帝利此云田主如此方之帝王也奕世猶云繼世也仁恕者以心度物曰恕操謂操行商賈者行賣曰商坐賣曰賈貿交博也遷謂遷易以有博無販賤賣貴也遂利遠近唯利是求無擇所在肆陳也疇壟田畝也上穡者種曰稼斂曰穡清濁殊流者剎帝利淨行是貴姓如清流毗舍首陀是賤姓如濁流婚不通者貴賤各自婚嫁也飛伏異路者西土之制貴賤之姓行則各路居則異處二阿難下隨情破執經若因土出下破有二義一約空土相異破二若無出入下約空土相即破二若此下顯真又二一示真性二斥邪說初又三一類通諸大注或有下指長水也彼云夫言大者常遍為義常故無生滅動搖遍故時處悉有乃至云本如來藏故名為大二阿難下反責迷心三汝全下正示真性經性覺真空性空真覺上句即真而俗下句即俗而真二世間下斥邪說六阿難下根大乃至識大科節如前注覺觸覺知皆意根者謂身根覺觸起分別時則屬意根此解恐非故私謂別釋經可狀成有不相成無珙鈔云上句色也下句空也於前境上復分此二即明暗色空之謂也識動見澄非和非合者此約根識動靜相違名非和合若望他境還破自生耳若風大中云風空性隔非和非合既對境論仍破他生也若火大中云日鏡相遠非和非合此乃自他相望正是破和合性隨義而說故非一塗二爾時下聞法領悟為二一經家敘事二阿難說偈初又二一敘悟心注十方即十界者然法華云深達罪福相遍照於十方以罪福在人故智者釋方以衆生為界今云心遍十方但以方所之方下文一切世間等自攝衆生也況迷妄有空依空立界宛成次第學者審之二禮佛下敘敬相二阿難說偈分四一讚德述益讚德二句先讚能說教主次讚所說行法注尊者十號之一此依釋論也若涅槃與瓔珞云一者如來乃至十者佛陀具足十號名世中尊以開無上士調御丈夫為兩號也孤山云所讚三德是佛所證乃由因中修乎三止三觀寂照心精而得斯果故阿難前請十方如來得成菩提妙奢摩他三摩禪那蓋請如來自行之因欲依修學既蒙開示已悟常心故還以三觀之因所克三德之果以讚於佛前後鉤鎖其義如是教行理三悉號楞嚴者問理是所冥豈曰楞嚴答例如說智及智處皆名為般若何妨說定及定處皆名為楞嚴乃至如唯識下圓師具引藏通別三教而為校量前引婆沙即藏教也次引大品明七地齊羅漢八地扶習潤生經無數劫然後成佛即通教也後引唯識明別教義今略中間也分見如來藏心者沇疏云據此境界合是別教登地圓教初住所證真如又解下必非經意引華嚴為例其事不類須據偈中不歷僧祇等者問此義可通圓人初心否答通說無妨如前文云若能轉物則同如來孤山亦約六即辨之今文所述既是佛世當機之衆須作分證法身而釋阿難雖在衆中等者縱未真證亦應似證何於涅槃為魔所罥者彼經第三十六佛問陳如阿難比丘今何所在陳如曰在娑羅林外為六萬四千億魔之所嬈亂是諸魔衆悉自變身為如來像說種種法乃至示現神通變化阿難見已作是念言如是神變昔來未見誰之所作將非世尊釋迦作耶欲起欲語都不從意爾時文殊師利從佛受陀羅尼至阿難所說呪已魔王等發菩提心捨於魔業即放阿難來至佛所罥古法切係取也二願今下發願報恩長水云即於此身期獲證果故云願今豫謂今者指我之辭以妙覺極果非即身可擭故三伏請下請證求加又二一請證化他注願取土如釋迦谷響云按法華經授阿難記未來作佛號山海慧自在通王彼既已說故此不云然彼所明乃是淨土故云其國土清淨名常立勝幡而今誓取穢土者何乎且夫證悟常心虗空尚殞唯一本妙淨穢誰論但順物機乃有差別極論其致佛佛道齊故大論三十六云當知釋迦文佛更有清淨國如阿彌陀佛國阿彌陀佛亦有不嚴淨國如釋迦文佛國既彌陀釋迦各有淨穢今阿難取土兩經異說何必致疑況復此云穢土先入後取淨土於義彌通當知却來觀世間猶如夢中事夢土淨穢勝劣誰分庶幾後昆試思此旨二大雄下求加自行注法身之用者問法身無相其用若何答法身冥應潛通機感即其用焉備如法華玄義四舜若下取譬結誓注比較音挍不等也起第四卷二對滿慈破性相兩疑顯不空如來藏分三一經家敘儀二大威下滿慈述意為四一歎人法二世尊下述自他又二一述自經說法人中我為第一者據小乘言之注本不似見者亦從昔日慧眼言之二世尊下述他經我等會中登無漏者述同類也其間多是法身大士晦本垂迹引接小機如富樓那已於法華得受記莂當來成佛號曰法明等問若據迹論阿難初果滿慈無學前文阿難尚已開悟何故滿慈等猶紆疑悔耶答非謂前悟而今不疑亦非今疑以前未悟處相起教叩佛宣揚若乃一期觀此二人迷理之心不無輕重何者阿難從初據人法二執迷空如來藏其迷則重滿慈於此懷性相兩疑迷不空如來藏其迷則輕又則空如來藏理猶易明不空如來藏義復難解是故阿難初果發起於前滿慈無學對揚於後孤山云前得悟者是上根利智今未悟者是中下之機今謂不然諸經說法若被中下須有委曲逗會之意如法華譬喻因緣二周開權顯實雖與法說不殊而比況指昔稍成委曲今經所談不空藏義蓋與空藏二義相成文旨愈深未易開解前阿難云希更審除微細惑意在茲矣苟分利鈍恐枉當機豫嘗議之若於此經欲分三根者從阿難請行已前雖通被三根其得悟者皆上根也請行已後方被中下然於行中有正有助亦可以正為中以助為下云云三世尊下疑性相又二一疑藏性云何生相經云何忽生下前文雖曰隨衆生心應所知量循業發現但總略而說且未委明諸法生起之由故今疑問廣談世間性相等義山河大地依報也諸有為相正報也依正各有生住異滅故云次第遷流等二又下疑大性云何俱遍經陵滅者蒼頡篇云陵侵也或作淩其義亦同四惟願下請開示三爾時下如來演說為二一總告二正說初又四一許宣二令汝下示蓋經未得二空下問佛意欲令未得空者而得於空此與不空如來藏義云何銷會答如說空華元由翳目從有所見知華本空談不空義亦為顯空耳注五性之宗楞伽經云一聲聞性二辟支佛性三如來乘性四不定乘性五無性謂一闡提佛地論莊嚴論瑜伽論皆說五性大同楞伽谷響云五性者三無二有祖於彌勒宗於天親析薪于玄奘克荷于慈恩立言垂範自為極唱今準此經顯知權說鈔文問纂要云法華與勝鬘經但回不定性二乘今經兼回定性是故最勝也斯義可否答甚不可也且法華中生滅度想者而於彼土求佛智慧豈非回定性耶勝鬘云羅漢支佛自知當得阿耨菩提此對菩薩說其往昔元發大心後終歸大非對二乘彰灼開顯問今經定性皆獲一乘為現世獲為同法華彼土方獲答二義俱通若爾法華應無現獲者耶此須善會經旨經云若有比丘實得阿羅漢若不信此法無有是處斯乃逼令現世回心從除佛滅度後方指未來回心者耳若解此意勿謗法華劣於今經也三汝今下誡聽四富樓下承旨二佛言下正說為二一釋藏性生相疑二釋大性俱遍疑初又四一牒前疑二汝常下舉常說又二一問注興福下彼云性覺妙明者妄覺也發性緣明因明覺生生遂名妄妄明云妙本覺明妙者本真也本源沖寂寂體無迷妙淨常如故云明妙資中下彼云性覺妙明者在纏真如也本性清淨不為煩惱所染名為性覺本覺明妙者出纏真如也從無分別智覺盡無始妄念名究竟覺始覺即本覺悟本之覺名為本覺又解下節疏具云體即用故下文云我以妙明不滅不生合如來藏而如來藏唯妙覺明是故於中一為無量等用即體故下文云觀性元真唯妙覺明妙覺明心先非水火等變其文者谷響云變文之例儒釋咸然舜典云流共工于幽州放歡兜于崇山竄三苗于三危極鯀于羽山孔安國曰極竄放流皆誅也異其文述作之體能所雙絶者二與一性其體元同故寂照互融者二亦無二其用常合故即寂而照下示互融之相也此性覺妙明本覺明妙有似瓔珞經云等覺照寂妙覺寂照但彼二句分對因果俱約修說今唯顯性是故互融問以妙明為寂照其有證乎答智者云法性寂然名止寂而常照名觀荊溪云止體靜觀體明故知寂照即靜明靜明即妙明也老子曰常無欲以觀其妙明皇注云人生而靜天之性感物而動性之欲若常守清靜解心釋神變照正性則觀乎妙本矣此豈非以妙為靜耶秪是本性之覺妙明互融者荊溪云若知煩惱及以生死本性清淨名之為寂本性如空名之為照髣佛者謂見物未諦相似之貌也夫藏性希微本絶言象非佛智眼莫能究盡如上所解且銷現文未敢言其明了故云髣佛在茲辭異意同者當以二句次第配之一一句中皆有三義二富樓下答三佛言下研現解又二一問注次問則別者且孤山以妄為覺既釋上句云為是覺體不明將何以辨虗妄分別稱為明覺耶長水以他為覺亦釋上句云為復覺自不明又何以知由覺他明明與覺異名為明覺耶若如二師所解並須於經更添句逗方顯其義斯由不曉上句中覺字是修非性故釋故句曲成己意耳二富樓下答四佛言下顯正義為二一通示真妄二別示迷悟初又二一真覺非妄明注無明尚混者從分證已還皆真妄相混故二性覺下真明生妄覺經妄為明覺者明覺二字俱通能所注中為令易解一往分之二覺非下別示迷悟分二一迷真故妄相忽生二悟真故妄相永寂初又二一略示二廣顯初又二一立妄法二示妄相初又二一立能所注然有二義下一約悟二約迷應知迷中未圓修時則無理智悟中未極證時必兼惑相涉於立法立修二義者問不空如來藏為二義俱取為但取立法耶答正取立法旁通立修以修有智行因果亦屬不空至因果泯亡方顯本性空如來藏二無同下立境界注資中下彼云熾然成異即業相因異立同即轉相無同無異即現相云云孤山下彼云異即六道執有同即二乘執空無同異即菩薩取中此九界執秪是一根本無明冥具此事耳云云不韙者左傳息侯伐鄭犯五不韙杜預云韙是也若論三細者起信云無明為因生三細一無明業相以依不覺故心動說名為業覺則不動動則有苦果不離因故二能見相以依不覺故能見不動則無見三境界相以依能見故境界妄現離見則無境界斯由下論云依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名阿梨耶識今云而分三相者以三細屬梨耶故藏法師疏引楞伽經以七識染法為生滅以如來藏淨法為不生滅此二和合為阿梨耶識以和合故非一非異六粗者疏云境界為緣生六粗一知相依於境界心起分別受與不受故二相續相依於智故生其苦樂覺心起念相應不斷故三執取相依於相續緣念境界住持苦樂心起著故四計名字相依於妄執分別假名言相故五起業相依於名字尋名取著造種種業故六業繫苦相以依業受報不自在故藏疏明三細六粗躡前起後略有八重一以一心為本二不覺一心成業相三能見相四境界相五分別相續法執六取著計名人執七造業八受報今經同異等蓋由人法二執造九界業受依正二報之相故云合是六粗境界又若以惑性所具等者惑性即根本無明此與法性無始同體故云須在性覺必明等二句中攝淨名云從無住本立一切法今惑性即其本也其猶下此喻理造未有事造也苟失大塗請從良導者若謂私解失於大塗請從舊師良者之導二如是下示妄相又二一示因相經自相渾濁者見與見緣似現前境元我覺明故云自也二起為下示果相沇疏云起是動即是風因風動搖積成世界故云起為世界動息之處即名為靜是前同相結成虗空故云虗空為同彼無同異真有為法即前無同異相結成有情含藏識也今難曰起是動相意謂動相即前業相業相起風結成世界且世界之與虗空乃三細中現相此相並由業轉而現豈可業相唯結世界轉相獨成虗空又以無同異相結成含藏識者斯更不可也既將無同異相對於現相現相即是藏識豈可復生藏識耶又若前三結成此三經文秪合云同為虗空異為世界彼無同異成有為法何文義之倒昧乎孤山謂由前性中計異之心外感世界立同之心外感虗空彼無同異心乃但中之妄執非真性無為之無同異也名既濫真故簡示云真有為法今難曰若由性計而感空界其文亦倒且計異之心豈不感空立同之心豈不感界以六道二乘皆迷妄有空依空立界故又則前同異二心既感外相無同異心那無所感乎縱巧銷其文終非經意故集解中斯皆別釋或曰狂簡試為裁之
