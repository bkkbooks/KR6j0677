body:
  text: 吳興沙門仁嶽述第八卷阿難是善男子下二示地位分二一正示二總結初為八一乾慧地注人未審之者長水也彼云無生忍中義說乾慧所謂圓融不礙行布等經現前殘質不復續生孤山云不生同居長水云即生實報同居猶近實報全疏然此一文甚難銷會若不作捨穢趣淨而解亦須作離欲生天而釋資中云今乾慧位能乾欲愛不受欲生上二界身應未全離此亦沇師之深見也鎣或作瑩國語注云徹明也注五品位者一隨喜二讀誦三說法四兼行六度五正行六度法華分別功德品格量後四品功德隨喜品格量初品功德但不合兼通等者彼云若準天台釋位此乾慧合是觀行相似即法華五品及六根清淨證真云此通六根太成混濫經中中流入智者云實心繫實境實緣次第生實實迭相注自然入實理止觀義例釋此一偈通於觀行相似以入分證今意如注二圓妙下十信注見惑先落三諦似顯者若諸文云見思障俗無明障中今破見惑合顯真諦此寄次第大節而判也若圓說者見惑落處塵沙無明亦微有破義真諦顯時俗中二理亦微有明義今云見惑先落且約粗分依次言之三諦似顯乃兼微義從圓而解此文既爾他皆例然一十八住者初發心住乃至上求佛地始終地位者始十信終妙覺垢衣香器者論第三云二乘雖破三毒不了了盡譬如香在器中香雖去餘氣仍在又第三十云如乳母衣久故垢著以淳灰淨浣雖無有垢垢氣猶在經氣分交接者以似證之理即諸佛之性雖未真證而覺了之智與佛潛通矣注正防無明等韓康伯云防患曰戒三阿難下十住十心對十乘法華玄文云善修平等法界即入信心乃至善修無著即入願心云云初住具十德者第一住三德一切佛法乃至第十住心心寂滅自然流入薩婆若海云云聲聞身至虗空身者彼談十身一一具十乃成百身荊溪以四身攝之謂化攝業報智即報身虗空屬法餘皆應攝孤山復作三身收之謂虗空即法智即是報餘皆屬應又云若約空生大覺國土依空則虗空之身亦宜屬應彼文問既屬三四何故十身皆名舍那答以別圓地住所現之身正是實報餘身皆是此身轉變從本受稱故曰舍那又盧舍那者寶梁經翻為淨滿以諸患都盡故云淨衆德悉圓故云滿十身雖異淨滿是同然於同中須知別相不可三四混而無甄故荊溪云彼通云身故云十身盧舍那別釋如來故不應云業報佛國土佛等太子世子異其文者谷響云漢制天子之嫡嗣曰太子諸侯之嫡嗣曰世子今譯者依古二名互出不分尚卑會太子于首止者謂僖五年會惠王太子鄭也首止衛地也然春秋作世子傳云太子耳文王世子者禮記篇目也以文王善為世子之禮故將號命篇四阿難下十行注須彌芥子相入攸同維摩涅槃皆說菩薩不思議用能以須彌之高廣內芥子中古師作相容釋之荊溪云須彌容芥謂容入於芥芥容須彌謂芥受須彌今現塵現界其相亦爾五阿難下十回向為二一十向正位二阿難下四種加行經妙圓加行者簡異偏小也若法華玄文取瓔珞五十二位明別教位則以十信為外凡住行向為內凡於內凡中分四加行十住為暖十行為頂十向為忍及世第一皆云義推如暖等今經於此別四加行秪是十向後心注文見矣智者曰諸聖上位非凡能測豈可妄說粗知大意為破行人增上慢心又為銷經引物希向不可偏執諍競是非注如仁王下三十聖故別住果報故圓無明未盡者問此四加行破幾品無明答孤山云應破四品大分言之總屬第十回向一品耳今謂不然位既開四惑何須合玄文云無明雖無所有不有而有不無階品一往大分為四十二品然其品數無量無邊由是觀之須開四品設復不開秪合云總屬初地一品以十向後正破初地無明故經如忍事人非壞非出節疏云如人含忍其事將說不說也或忍以印可為義如人正領解印可前事自己所證言說未及非懷喻亡前微礙非出喻尚存中道孤山云已得初地似解如忍事人非不在懷而未得真證如非出口然此二句諸說異端今別注之請詳可否僧中辨事即羯磨也六阿難下十地注以無緣慈普覆衆生等者慈無別體即上文與如之心也菩薩與衆生一如無二如約事暫分故以菩薩能證之心覆衆生所迷之理淨名云一切衆生即涅槃相不復更滅今取因理無涯譬之如海果德遍覆喻之如雲以慈能與樂必對物機而說故作是釋歟如來下等覺分三一覺際入交注如來權智等問如來豈無實智菩薩豈無權智耶答其實雙具但佛自行觀理已圓鑒物是正故用於權今自行未極化他是旁故用於實也孤山作如來逆生死流菩薩順生死流釋此文者於義全失二阿難下金剛乾慧注莫知適從適讀為的左傳曰衆誰適從核者說文云考事之實也金剛幢慧者乾慧取伏惑之義幢慧取衆伏之頂以高出諸地故法華玄文云等覺位若望菩薩名等覺佛若望妙覺名金剛心菩薩又仁王經說每一地有三心謂入心住心出心例知此經覺際入交即入心也金剛乾慧即住心也出心可解由此菩薩等文出瓔珞八如是下妙覺二是下總結又二一結行位經如幻十喻具在大品注乾城者釋論云日初出時見城門樓櫓宮殿行人出入日轉高轉滅眼見無實是名乾闥婆城或指金剛等孤山疏也二作是下簡邪正沇疏云若依此位修行真菩提路即是正觀若不依者即是邪觀注須知下斯與沇意稍別兼之可矣三爾時下顯經名分二一文殊問二佛告下如來答經汝當奉持者或曰據文殊所問合有二意一當何名是經二我等云何奉持今答名則顯而答持何隱乎釋曰問雖以二意秪是一蓋欲知能詮之名為我等所持之法良以若不知首題總名則不了一經大旨若不了一經大旨將何以為衆生發心受持之法乎然則佛答五名名下五義法在其中故此但云汝當奉持答無所遺也注撮要為名等廣如說題三說是下釋疑分三一經家敘事經開示密印至了義名目者五名之中有祕密呪題有顯了經題云云頓悟下却指前文五十五位增上下顯今得益及所斷惑相節疏云修道智斷故曰修心欲界前六品惑體是俱生故言微細二大威下阿難疑問為三一歎佛蒙益二世尊下據理陳疑分二一通疑諸趣長水云此由前文佛語阿難今汝諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相如湯銷冰應念化成無上知覺斯一人成佛器界有情一時成佛如來今日成佛已久不合更有器界趣類故云佛體真實云何復有地獄等道今謂此有三失一者躡文太遠文在第四豈至此中躡為難勢二者濫前滿慈所難之意前云若此妙覺明與如來心不增不減無狀忽生山河大地諸有為相如來今得妙空明覺山河大地有為習漏何當復生等三者今阿難所疑蓋疑凡夫本真云何造作諸趣非難如來已成更有斯事而云佛體真實者以上文云大地草木蠕動含靈等即是佛體故此指迷中佛體安得認為果上佛體耶孤山云此與滿慈所疑其旨一揆但所因既別故其辭小異前因佛說根塵等皆如來藏故起疑今因佛說妙圓明本來無有世界衆生故起疑皆為機緣發斯問耳非實然也今注中取圓師所躡文相仍辨七趣來意二世尊下別問地獄經琉璃為誅瞿曇族姓者瞿雲釋迦前姓也初迦維羅衛國有舍夷貴姓舍夷即釋迦別目五百長者共為世尊造立講堂自相誓曰沙門梵志乃至羣黎不得先佛妄升此堂若有違者罪在不測舍衛太子名曰琉璃因省定外氏入城見堂高廣嚴飾頓止其上貴姓聞之遣使罵辱催逐令去太子懷恚敕太史記之須吾為王當誅此類於後即位領兵伐迦維國殺舍夷人三億乃至佛言彼琉璃王却後七日當入地獄王聞恐怖乘船入海冀得自免水中自然出火燒滅廣如本經善星妄說一切法空者善星比丘是佛菩薩時子出家之後受持解脫十二部經壞欲界結獲得四禪而親近惡友退失此定生惡邪見言無佛無法無有涅槃後在尼連河遙見佛來生惡邪心生身陷入阿鼻地獄事載涅槃迦葉菩薩品三惟垂下為他求決三佛告下如來答釋為二一垂許二阿難下正釋分二一廣約因果以辨趣生二總結虗妄以勸除滅初又二一約情想通明二約因果別示初又二一開妄習以為二分二依二分以辨趣生初又二一雙標二阿難下別示為二一情為內分二想為外分初又二一示相注喜怒等者白虎通云人稟陰陽氣而生故內懷五性五常性之六情性者陽之施情者陰之化六情者何謂喜怒哀樂愛惡若準禮運以樂為懼更加於欲謂之七情也儒說既云情屬於陰陰生於水亦符此經之義二阿難下結名注從持戒善及修禪定者始自三歸五戒十善乃至根本事定等悉名外分問此等所修報在界內何名外分耶答今約衆生心行而分內外非出三界方名為外且內分者猶云自分也以俱生煩惱不由他教從無始來自爾而有如荀子曰飢而欲食寒而欲暖勞而欲息好利而惡害是人之所生而有也是無待而然者也楊倞注不待學而知今云內分即其義焉若戒善等必須由他所教待學而成故曰外分諸疏秪據現文銷釋殊不明情想分齊寧盡內外之意乎持毀相紛善惡猶雜者持毀別言於戒善惡通語於業即十善十惡也當知六道以三善三惡分之人屬善道且約總報強分而說至論心行豈得精純法華疏云人者梵語摩㝹奢此云意以諸有所作善惡惟故又人名為慢以五道中人多慢故由是觀之人之名義亦善惡著矣孟子云人性善荀子云人性惡楊子云人性善惡混雜三說各有其理唯善惡混稍同情想均等之義二阿難下想為外分又二一示相經心持呪印印謂以手結印如瑜伽羂索所示或呪即是印如銷伏毒害呪是三世諸佛陀羅尼印故此舉善法以驗能生勝氣之相若呪龍等惡律儀事非其義也聖境冥現者蓋於想中冥密得見諸佛淨土或於多中潛通此相亦是冥現注毅得之貌爾雅云犯奢果毅郭璞云皆得勝也二阿難下結名經飛動不沉自然超越此約不墜三塗名為超越例如人天俱得名乘亦由戒善等能運載衆生越於惡趣耳二阿下依二分以辨趣生為二一正辨二總結初又二一明死生交際經臨命終時未捨暖觸者命是息風連持不斷故暖是身觸住持不壞故識託其中共成三事和合則生離散則死今文雖不言識而云二習相交即識之習性也一生善惡俱時頓現者善惡即內外二分也頓現即二分業相也下文情想純雜等即隨其業力牽生諸趣也當知現前二分是將來諸趣升墜之權衡昔圭峯密師云欲驗臨終自在不自在但觀日用自由不自由其言雖近可以喻遠二明諸趣差別為五一純想經兼福兼慧者如觀無量壽佛經云欲生彼國當修三福云云慧即十六觀也此別就西方言之若通說者緣因為福了因為慧隨諸淨願取土往生應知福慧通於深淺今且約初心未斷見愛未出同居橫截五道得生淨土故荊溪云未斷惑者修安樂行是同居淨土之氣分其義明矣注於飛心中旁論福慧者以純想是穢土上升之因福慧是淨土往生之業事越外分故云旁論二情少想多經飛仙者準下文仙趣凡有十種唯第二堅固草木而不休息藥道圓成名飛行仙其第一名地行仙乃至第十名絶行仙今云飛仙取輕舉之義總攝十種也以在人天中間與下文次第不別故況地行羅剎尚屬此類豈地行仙等而不逮耶大力鬼王者如第七卷諸羅剎王富單那王等是也保綏法忍者綏安也法忍謂於法得忍即諸大菩薩也注以不持戒下據第六卷云汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎今資中所解與前文義一往相似然而前所說定自是楞嚴三昧非此中之想也當知情少想多者但約十善十惡強弱分之自顯其義況有善願善心護持佛法等並是衆生分外之事不須別取修定而為想也法華玄義明若修十善兼修禪定得粗住細住者乃是兜率天業驗今所說猶屬散善耳三情想均等注總報之業此約大分言之別報之業於大分中自分強弱也當知均等且就不飛不墜一往校量至論幽明理須甄別如仲尼云中人以上可以語上中人以下不可以語上又曰唯上智與下愚不移豈非人間三品不同耶今亦可以情想均等配于中人想明斯聰其上智也情幽斯鈍其下愚也四情多想少經身入風火二交過地即地獄中猛風與火交相熾盛也注近於地獄是餓鬼住處順正理論云諸鬼本住琰魔王國從此展轉散趣餘方此瞻部洲南邊直下深過五百踰繕那有琰魔王都縱廣亦爾俱舍論大同而不云南邊直下七熱地獄者謂八大獄中第七也長阿含云此四天下有八千天下圍繞其外復有大海周匝圍繞八千天下復有大金剛山繞大海水金剛山外復有第二大金剛山樓炭經二金剛山名為二鐵圍山二山中間𥥆𥥆冥冥日月天神所不能照彼有八大地獄每一地獄有十六地獄第一大獄名想二名黑繩三名堆壓四名叫喚五名大呌喚六名燒炙七名大燒炙八名無間分別其相具如第十九卷又新譯婆沙論問曰地獄在何處答曰多分在此瞻部洲下云何安立有說從此洲下四万踰繕那至無間地獄底無間縱廣高下各二万踰繕那次上一万九千踰繕那中安立餘七地獄謂次上有極熱次上有熱次上有大叫次上有嘷叫次上有衆合次上有黑繩次上有等活此七地獄一一縱廣万踰繕那有說無間地獄周回圍繞如今聚落圍繞大城云云秪就此獄自有輕重者亦應以第六為有間第七為無間是則風火二交過地通於六七也五純情經阿鼻者觀佛三昧海經云阿言無鼻言遮阿言無鼻言救阿言無間鼻言無動云云二修造下總結注毛羣羽族散在諸趣俱舍論云傍生住處謂水陸空本住大海後流餘處今從後說也斯亦略訓阿難所問者以下文地獄趣後更有結酬之辭對此乃成廣略二意二阿難下約因果別示分七一地獄趣乃至七修羅趣初又三一躡前總標二云何下依標別釋為二一十習因二六交報初文節疏以十習配屬根隨煩惱根本有六謂貪瞋癡慢疑不正見或開為五隨有二十謂忿恨惱覆誑諂憍害嫉慳無慚無愧不信懈怠放逸昏沈掉舉失念不正知散亂今淫習即所發之業具足貪癡誑習即諂怨習即恨見即五見枉謂逼壓良善害所攝也亦瞋之類也訟謂相論得失忿恨為先惱之一法性相應故餘皆可見文有十科今不別列經二習相然謂燒然此取欲火義說故也沈疏云能觸所觸皆是自心互相熏習結成淫業因此業種後感其報從能觸現地獄身從所觸現諸苦具下準此釋孤山云亦是男女相望互為能所乃成二習共感諸文皆爾注八寒地獄者並居瞻部洲下大地獄傍具如俱舍論第十一卷如此方之貪泉谷響云晉書吳隱之為廣州刺史行經于嶺南有水名貪泉飲之令廉者貪隱之至取而飲之作詩曰嶺南有一水世號貪泉深試令夷齊飲終當不易心經銜冤者谷響引顏師古注漢書曰銜含也苞含在心以為過也注古五刑者謂墨劓剕宮大辟鄭注周禮云墨謂刻其額而涅之以墨劓謂截其鼻剕謂刖其足宮謂男子則割去其勢女子則幽閉之大辟即死刑也經相調去聲猶戲唬也以此誘引而造諸惡注屨校滅趾荷校滅耳者在足曰屨在肩曰荷滅沒也郭璞下見爾雅注彼又云身廣三寸頭大如人擘指史記下谷響備引秦始皇有伏怒於太后群臣諫而死者以十數茅焦諫曰陛下車裂假父有嫉妬之心囊撲兩弟有不慈之名遷母咸陽有不孝之行臣竊為階下危之言畢乃解衣趨鑊始皇下殿左手接之曰先生起矣即迎太后遂為母子如初鴆須者經本皆作鴆孤山依左傳注故從酉也廣志云其鳥如梟食蛇蝮雄名運日雌名陰諧以其毛歷飲食則殺人經薩迦耶竦疏曰具云薩迦耶達利瑟致此翻身見百法疏謂於五蘊執我我所等碾磑耕磨者郭五對切郭璞注方言云磑即磨也今文言磨者應分旋轉縱橫之異霹靂者爾雅云疾雷為霆為電注曰雷之急激者謂霹靂抱朴子云雷天鼓也王充論衡云圖畫之工圖雷之狀如連鼓形又圖一人若力士謂之雷公左手引連鼓右手椎之彼文是知先儒但言陰陽薄激而為雷霆者未盡理也必有神物主而行之如庶女叫天齊臺遭擊豈陰陽二氣偏其感驗乎況世有惡人震銘其身者多矣又論衡云盛夏之時迅雷擊折樹木破敗室屋俗以為天取龍也其犯殺人者謂有陰過斯可信焉陰賊者谷響引漢書注曰以陰氣賊害也注應云二習相爭有本作二習相陳恐後人擅加耳二云何下六交報分二一總示經所招惡報從六根出出猶生也現也果自因生境非他現注報多約色者以六報中唯思報屬心故此約能受根說若約所受境說則六皆是色如法華中如是報者荊溪唯以色法收之二云何下別釋為六科節可見經此見業交者問業即是因既招惡果豈非因與果交何故上文不許璿師之義答凡云業者不獨在因住持善惡從因至果皆業力也今明現報臨終之業望於乎昔所作之業亦是果時眼根與惡報交非璿義也亡者神識飛墜乘煙等孤山引成論明極善極惡不經中陰現陰才謝即受生陰如䂎豫離手即時到地今墮無間故無中陰若墮餘獄則容有其相故俱舍中陰頌云地獄頭歸下是也煽式連切火盛貌注六報互通證真云以造業時一根為正餘根為助故今受報雖眼根為首還遍六根也此與注異講者裁之經愗亂者篇韻皆云怐愗愚貌上音寇下音貿沇疏以愗為怕者非為餒者谷響云餒奴罪反經文或作餲於介反論語曰食饐而餲孔曰饐餲臭味變又曰魚餒而肉敗何晏曰魚敗曰餒義可通用故兩存之為承為忍者經本或依為蒸者非或作為認者孤山云亦通此義謂招認罪名也注觀謂獄王之闕谷響引中華古今注闕者觀也古者每門樹兩觀於其前所以標表宮門也其上可居登之則可遠觀故謂之觀人臣將朝至此則思其所闕故謂之闕漢書作事者顏師古曰事音側吏反字本作倳周官考工記又作菑音義皆同經迷極則荒夏書注云迷亂曰荒為霿者或作霜字之誤也霿與雺同音蒙又莫弄切爾雅云天氣下地不應曰雺注云蒙昧也為土者約雨言之即霾也注智論明四大等彼文具云地有色香味觸重故自無所作水少香故動作勝地火少香味故勝於水風少色香味故動作勝火心無四事故所為力大三阿難下結釋顯酬分三一結因果問據六交報所墮之獄皆云無間然則十習因悉是無間之業耶答不然如貪習所感八寒地獄非無間也乃至訟習所感業鏡火珠等此是受報前事豈不鑒照有間之人乎故知六交報中且舉無間為首其中不無前七地獄并諸小獄之相請尋阿含樓炭俱舍婆沙等備曉其事二若諸下示輕重經八無間獄智論云八大地獄復有十六小獄而為眷屬謂八寒冰八焰火八寒冰與俱舍大同八焰火者一炭坑二沸尿三燒林四劍林五刀道六鐵刺林七醎河八銅橛注火獄有八應是小獄寒獄有十則與論文不同餘經或說十八寒水地獄十八熱地獄十八刀輪地獄乃至八万四千地獄故知獄相差別多品經三業者即殺盜淫也見見一根者長水音上見字為現義恐不然注能見所見等問如犯殺時必須作意或復發言乃至身根斷彼物命方結正罪云何單從眼根能犯一業耶答此約六根偏重者言之然於餘根非不相帶有異前文兼境兼根所作皆重故罪從輕也三由是下酬疑問前阿難問云此諸地獄為有定處為復自然彼發業各各私受故今答曰於世中入同分地又前問云此道為復本來自有為是衆生妄習生起故今答曰妄想發生非本來有二復次下鬼趣分三一總標經非破律儀謂聲聞戒也撥無曰非違犯曰破後還罪畢受諸鬼形者不經地獄直墮鬼趣則如前文七情三想沈下水輪生於火際受氣猛火身為餓鬼也下文畜趣人趣例此說之二若於下別顯注夔魍魎者據切韻夔是獸名一足無角今恐魍魎似之故抱朴子曰山精形如小兒獨足足向後善犯人或云獨足蝄蜽好學人聲而迷惑人越人謂之山魈是也三阿難下結示孤山云純情墜落者愛水下流也業火燒乾者燒乾愛水也三復次下畜趣為三一總標二物怪下別顯注還遭鬼附谷響引說文云孤妖獸也鬼所乘也有三德其色中和小前大後死則首丘郭氏玄中記曰千歲之狐為淫婦百歲之孤為美女服類謂牛馬等沇疏云蠶繭之類者非社燕者廣雅云玄鳥也今俗作燕左傳少皡以玄鳥氏司公注云春分來秋分去此當春秋二社之際故云社燕賓鴻者禮記曰季秋之月鴻鴈來賓司晨者谷響云雞主晨鳴易林曰巽為雞雞鳴節時家樂無憂警露鶴也周處風土記云白鶴性警至八月露降流於草木葉上滴滴有聲則鳴三阿難下結示經業火乾枯即前文云情與想二俱成空也如汝所言寶蓮香等問此事本是地獄惡業之相那於畜趣後結示耶答前阿難所舉三人且約惡趣極重者問之今佛於畜趣後說者蓋顯三惡同其流類如上明鬼畜皆是地獄業火燒乾出生其趣寶蓮香等豈免斯報耶故於此中示之非無所以四復次下人趣為二一正顯二結示初又二一酬償先債注修定學慧者應取兼有福德一句為持戒則三學備矣又布施忍辱精進悉名福德則六度備矣二汝今下酬足復形注檮杌如第四記皂隸民之賤者也脂韋以柔順人也二阿難下結示經業計顛倒計猶執也有作繫者聲之誤矣五阿難下仙趣為三一總標注抱朴子谷響云東晉葛洪自號也若抱朴子內篇凡二十章皆秦漢以來方術之道非老莊之道也其詞可采者唯此耳二阿難下別顯沇疏釋十仙四與真際有異余亦大同唯不解堅固交遘耳今略録其異伏餌者食麻仁之類也金石者能化骨成仙也通行者應有五通即神仙通人絶行者變化不息如尸解之類言覺悟圓成者謂絶於視聽令如槁木等彼疏問所謂尸解者何耶答案道家真誥云道有陰廣陽若鍊形道合呼吸純陽秪自肉身次第變蛻蛻而俞妙身入無形所蛻之皮宛同蟬殼解變之後因無骸骨縱葬墳冢唯劒寫履杖存焉此陽度也若陰度者即為陸仙也通慧有楞嚴七趣鈔備引其書并升無九真等經以明仙趣事多虗誕未敢聞命注點石為金者豫恐此釋不逮沇師何則以堅固金石亦約服餌言之良由十仙皆是存想固形而得成就若言恤貧哀苦斯乃外事何名固形耶如天無異者沇疏解天行云此天不是六欲天如張騫至昆崙山上得見天宮也未能頓異且依古釋者此是孤山引真際釋十仙後總結之文蓋謂節疏未全當也又谷響據崔玄山瀨卿記曰老子為十三聖師養性得仙各自有法凡三十六或以五行六甲陳或以服食度骨筋乃至或以去欲但存神此三十六與此十仙頗有符合者鈔文今謂玄山之言傳自繆俗圓師引用乃與前來采葛洪之詞意甚不類豫竊駭之案劉協滅惑論云道家立法厥品有三上標老子次述神仙下襲張陵太上為宗尋柱史嘉遁實惟大賢著書論道貴在無為理歸靜一化本虗柔然而三世弗紀慧業靡聞斯乃導俗之良書非出世之妙典然則玄山以神仙之道誣老子之道也明矣又道安二教論云靈升羽蛻尸解形化尤乖老莊立言本理而瀨卿記中有云或以歔歙游天山或以清淨飛淩雲復有癸祀藥石之記其大乖矣問神仙之道有長生不死之理合居老子之上何故劉協抑為中品答有名無實君子不取何抑之有故牟子曰王喬赤松等神仙之書聽之則洋洋盈耳求其效猶握風而捕影耳又曰堯舜周孔各不能百載而末世愚惑欲服食辟穀求無窮之壽者哀哉昔高僧曇服食辟穀求無窮之壽者哀哉昔高僧曇鸞欲求仙方以益其壽乃往江南陶隱居處求之得書十卷將至洛下見中國三藏菩提留支鸞曰佛法中有此長生不死之法乎支唾地曰是何言歟非相此也此方何處有生不死之門因焚其書若爾今經云存想固形壽千萬歲亦虗妄耶答此土雖無西天或有以彼外道學四毗陀修諸禪定得五神通如金頭仙恐身死故往自在天問云云應知前文所說迦毗羅仙斫迦羅仙等諸大幻師不可以此方外道同日而語況今十仙並由鍊心其道圓成多是捨生趣生乃獲斯壽昔人一向作即生而解往往疑松喬而惑黃老矣又谷響云節疏釋精行仙全誤且交遘者非是交互第一經云腥臊交遘第四經云交遘發生即周易云男女構精萬物化生是也神仙傳云彭祖治房中之術蓋此類矣七趣鈔云張陵勸人行房中術而真誥中再三訶赤白之氣穢惡之事今謂精行仙若是其類應如下文云於邪淫中心不流逸者方預斯趣由所習既劣故在天趣之下三阿難下結示注崑崙者水經云崑崙之墟在西北方去嵩高五萬里地之中高一萬一千里河水出東北陬野古文野字見卵而求時夜者出莊子內篇下句云見彈而求梟樂時夜猶云司晨謂雞也彼喻瞿鵲子方聞孟浪之言而便以為妙道之行無異見卵而責司晨之功見彈而求梟樂之實也黃帝至張陵者皇覽云黃帝冢在嶠山老子冢在扶風槐里即其地也又安法師云老子死扶風葬槐里劉安伏鉞事載漢書曹子建辨道論云劉安王誅於淮南道家謂之尸逝柩空其為虗妄甚矣哉魏志曰張陵造作道書以惑百姓從受道者出米五斗世號米賊李膺蜀記曰張陵避𤷡於丘社中得呪鬼之書為是遂解使鬼後為大蟒所吸弟子妄述升六天趣為二一正顯界趣二結成妄有初又三一欲界二色界三無色界初又二一別示二總結初又六一四天王天智者云上升之元首下界之初天居半須彌云云二忉利天經於淨居時不得全味沇疏云欲愛漸微故曰不得全味今謂不爾上文已云淫愛微薄何須再言斯蓋於淨居時不得淨法滋味也智論有三種味一出家味二讀誦味三坐禪味今淨居猶坐禪也忉利者梵音訛略正言多羅夜登陵舍此云三十三佛地論曰妙高山頂四面各有八大天王帝釋居中故有此數三須焰摩天經人間世莊子有人間世篇譯者潤文取其語耳動少靜多者動謂欲散靜謂寂靜此帶欲界定言之但未得粗住細住以此驗前淨居之人合是創修欲定者也四兜率陀天注此云知足佛地論名為喜足謂後身菩薩於中教化多修喜足故五樂變化天經生越化地珙鈔云諸天用異熟境此天不爾雖有異熟五塵樂自變化以受用也是則越下而化故云越化六他化自在天經了然超越者亦無嚼蠟之味也問小乘果位尚因欲事喜生退失凡夫何得臨境無心答實如所問討諸疏鈔闕論此義豫嘗究之須約一分修禪定者伏惑堅固乃能如是或依佛教修無漏通即九想等不淨觀慧方有斯力經中一往且說離欲之相而未顯示離之所以苟無定慧但令散心凡夫無世間心同世行事者是猶使飢渴之人於飲食無味其可得乎諸有智者一為思之二阿難下總結注俱舍頌六受欲謂六天受欲事也交抱等六字是欲事差別之相淫字是六欲總名起第九卷二色界為二一別示二總結初又四一初禪乃至四四禪初又二一示二結初又三一梵衆天注資中下意謂四禪是根本定以四無量心神通變化及無漏觀慧等悉從四禪中出故不修此禪則無有智慧也擕李下孤山亦取此義六行者厭下苦粗障欣上勝妙出云云若據仙趣之初云不依正覺修三摩地及下文總結諸禪皆云雖非正修真三摩地等當依敏說為善二梵輔天經能行梵德者如世大臣出納王命也三大梵天注無尋唯伺論明三摩地有三種一有尋伺謂初禪及未至定也二無尋無伺謂二禪近分乃至非想等今大梵天即中間定力所感劫末後去劫成先來者證真云劫初成時梵王先獨住一劫未有梵侶後起念云願諸有情來生此處作是念已梵子即生外道不測便執梵王是常梵子無常二阿難下結經一切苦惱所不能逼沇疏云離欲界八苦也注有漏禪等略如法界次第廣如禪門修五法者欲念精進巧慧一心也離五蓋者貪欲瞋恚睡眠掉悔疑也成五支者覺觀喜樂一心也具有八觸者動癢涼暖輕重澀滑復有八觸曰掉猗冷熱浮沉堅軟此八雖與前觸大同若纍分別不無小異合而言之名十六觸十功德者一定二空三明淨四喜悅五樂六善心生七知見明了八無纍解脫九境界現前十心調柔軟云云二二禪分二一示二結初又三一少光天二無量光天三光音天餘經或以少光為光音此天名極光義亦可解二結注喜俱禪此有四支謂內淨喜樂一心也此禪發時如人從暗室中出見日月光明其心豁然明亮八觸十功德亦同初禪但從內淨俱發為異懸或作愁出行瑫經音今謂懸者繫也以離覺觀故無所繫著三三禪分二一示二結初又三一少淨天二無量淨天三遍淨天皆如文二結經具大隨順沇疏云意地異熟樂隨順自在故證真曰異熟樂者徹於意地遍身適悅與五識相應不可分別也注樂俱禪此有五支謂捨念慧樂一心也四四禪分二一四根本二五不還初又二一示二結初又四一福生天餘經或名無雲天第二福愛名次福生經淨福性生性謂體性亦約內說此禪與微妙捨受俱發故名捨俱禪具有四支一不苦不樂二捨三念清淨四一心二福愛天有本作福受天字之誤三廣果天經修證而住且約不生無想言之若厭色窮空亦復無住以四無量心熏禪福德即廣果之因也四無想天經滅為因即於先心雙厭苦樂等初半劫下明果時生滅證真云然此四禪總報別業但有三品感下三天其無想天秪是廣果天中別報凡夫境界上極於此後五不還亦是聖人雜修靜慮資廣果天業令五品殊勝生彼受樂與凡夫不同注無想異熟百法論名為無想報屬不相應行彼疏云由欲界修感彼天果名無想報亦云無想異熟此有三義一變異而熟要因成熟方能招果二異時而熟過去造因今現得果三異類而熟由善惡因感無記果二結二五不還分三一標梵語阿那含此云不還亦名不來準俱舍論色界有五種那含頌曰此中生有行無行般涅槃上流若雜修能至究竟言五種者一中般謂往色界住中有位便般涅槃二生般謂生色界已不久便般涅槃三有行般謂生色界已長時加行不息由多功用方般涅槃四無行般謂生色界已經久加行懈息不多功用而般涅槃五上流謂往色界要轉生上方般涅槃此有二種由因與果異故因異者有雜修也果異者至色究竟及有頂也前是觀行後是上行樂慧樂定不同故廣如論釋今五不還天即樂慧者所生也注又能進斷第三禪染者初二三禪皆有九品修惑俱名為染俱舍下頌曰由雜修五品生有五淨居論曰由雜熏修第四靜慮有五品故淨居唯五何謂五品如注所列初品三心謂初無漏次起有漏復起無漏第三品六第三品九第四品十二第五品十五如是五品雜修靜慮如其次第感五淨居有餘師言由信等五次第增上感五淨居云云二示為五一無煩天二無熱天注箭括者谷響云箭末曰括家語云括而羽之鏃而礪之又莊子齊物篇曰其發若機括其司是非之謂也文如海注云機弩牙括箭括三善見天四善現天經陶鑄無礙孤山云如陶師之為器爐冶之鑄像言其作用自在也五色究竟天注初用多念無漏等略示初後二品雜修之相如第四禪先修得已更以多念無漏相續而起從此引生多念有漏然復起多念無漏即初品三心也如是後後漸漸減少乃至二念名加行成唯有一念名根本成三結二總結如文三復次下無色界分二一別示二總結初又二一別示二總結初又二一分兩歧注盡無生智謂見苦已斷乃至道已修名盡智不復更斷乃至不復更修名無生智破定性之明文者以第四卷初云今汝定性皆獲一乘故涅槃五人者現病品云有五種人於是大乘有病行處非如來也一須陀洹是人未來過八萬劫當得菩提二斯陀含過六萬劫三阿那含過四萬劫四阿羅漢過二萬劫五辟支佛過十千劫云云彼是界外發心即入初住者輔行云言須陀洹等從本為名經七生已任運入般生彼復經八萬劫竟方發大心乃至支佛一萬劫比說可知從根利鈍故使出界經劫長短發心已後修中道觀斷無明惑得見佛性此是界內回心方成四果者亦從本為名此若出界則與涅槃中第四果人經二萬劫者齊也二若在下明四處為四一空處注無漏道謂八聖種觀有漏道即六行觀也八聖種觀者觀五陰如病如㿈如瘡如刺無常苦空無我云云二識處經全於末那半分微細沇疏兩解一云末那第七與四惑俱謂癡愛見慢凡夫全在聖斷未盡凡聖合論故云全於末那半分微細又解末那全在半分微細謂第六識也此與真際義同證真曰凡聖合論此亦非理今乍取第二解雖銷經不便且於教理無違三無所有處四非非想處前觀識處有想無所有處是非想今雙違之又凡夫外道得此定謂證涅槃斷一切想故言非想佛弟子如實知有細想依四陰而住故云非非想此約得失合而名之二此等下總結為三一生通凡聖注欣厭未盡欣即窮空之心厭是捨苦之行此四空處生滅猶在真空不明故云未盡也縱是聖人下謂五不還人修八聖種觀雖至有頂亦不免生滅四陰惑者具有十種心心數法謂受想行觸思欲解念定慧云云滅受想定如迦葉說圓通中聖人有生至外道有不生者前回心中已說聖人不生此等窮空下已明外道生者是故從不還天下復示聖人有生此處及外道有不生此處者也舊解下沇疏云從無想天來者應是廣果與無想同地是外道數故云無想天來準經論釋無想外道業盡必墮無生上義孤山云然人根不同諸教偏說一分耳況今明云從想來豈可違經今謂廣果之說固違現文無想而來豈順經旨若許私釋則兩疏之非相去何遠問無想天心慮灰凝寧有窮空之意耶答初半劫滅必由窮空方入無想如前所解二阿難下處有王民經菩薩者沇疏云準嚴經皆是登地菩薩示為天王然則別圓二教法身大士方能為也注善入出住者九次第定善入師子奮迅善出超越三昧善住云云圓師又云若達禪實相即號楞嚴三阿難下果無色質注定果色出百法論若顯揚論名定自在所生色謂勝定力故於一切色皆得自在即以定變起五塵之境也二此皆下結成妄有注補特伽羅瑜伽論說八種人執第六名補特伽羅謂數數取諸趣故我死於此能生於彼正能生者即是人執七復次下修羅趣翻名如第六卷注孤山云若依七趣優劣則修羅在人趣之下今為攝屬不定故在其後經能與梵王等爭權此鬪戰修羅廣如正法念經所說彼云若閻浮提人須法修行孝事父母供養沙門及婆羅門恭敬耆舊天衆則勝若諸世人不順法教修羅則勝注法華四種者一婆稚此云被縛二佉羅騫䭾廣肩胛三毗摩質多羅淨心四羅睺障持一往觀之下據正法念中毗摩質多羅及羅睺阿修羅亦住水底以屬第四今約爭權而論以同第三類耳然今第四既云下劣應是別就一類不能與天鬬戰者言之非無別報者起世經云修羅所居宮殿城郭器用降地居天一等亦有婚姻男女法式略如人間故正法念下彼第十八云阿修羅略有二種一者鬼道所攝魔身餓鬼有神通力二者畜生所攝住大海底須彌山側云云二阿難下總結虗妄以勸除滅為三一結虗妄二勸除滅三顯邪正初又二一明妄相二明妄業如文二若得下勸除滅分二一約悟論滅二約修勸除初又二一正明注亦應下此文外之旨也謂尚無於真云何隨俗二阿難下反顯二汝勗下約修勸除又二一正明二不盡下反顯經神通謂五神通習氣即三惑也落於魔道者且約不斷淫者言之若復殺盜則落神道邪道三作是下顯邪正可解注諸家並以辨魔之文猶屬正宗唯竦疏云吾今已說等是結前正宗汝猶未識下雖是通後以皆是正修行相故屬正說也豫觀竦意似是而非故私謂中作教行二門分於流通此其大節也恐來學未練今更以五義評之夫首楞嚴法正說有三初開解次顯行後示位自凡至聖原始要終盡在此矣是以文殊問名實流通之能事慤節所判非無一塗但由示位之初對迷顯悟而於迷中所說十二類生界趣未周恐妨地位故且存略至說位畢問名之後阿難重問地獄人天等道於是如來廣談七趣蓋釋正宗之餘疑耳故知此下合入流通其義一也復次前解行位文皆因阿難請問而答洎辨魔境文相孤起驗乎當機事竟故慶喜緘言垂裕意殊故如來自說其義二也又經家敘事云如來將解法座於師子牀攬七寶几回紫金山再來憑倚普告大衆豈非將罷是正說之終再來是流通之始其義三也又下文欲辨魔事佛自結云吾今已說真修行法若正宗未訖何名已說乎其義四也又辨魔中具有付囑宣傳之語如色陰末云汝等當依如來滅後於末法中宣示斯義無令天魔得其方便乃至五陰節節付囑其旨惟勤諸經流通豈過於此其義五也問孤山準天台止觀所說魔事皆是正修所發之境例今魔事合是正宗豫既祖於天台而違於止觀無乃不可乎答夫流名下注通名不壅使正法之水從今以注當也此經魔事正被於當令持法者如教而示此觀魔境自被於現今修禪者隨發而觀當知祇桓之流通即是玉泉之正說佛世滅後安得例同於戲集解者凡有異說雖私於衆而實公於心何敢輒拒先賢自速來禍苟趣捨之失將有罪我者願無陰乎三流通分為二一經家敘事二汝等下如來示誨分二一結前生後二興慈演說初又二一結前行法經吾今已說真修行法此應二義一者通指正宗分解行位三科俱名真修行法如初卷中即云有三摩提名大佛頂首楞嚴王具足萬行汝今諦聽等二者別指正助兩行及五十五位名為行法以諸位中皆是用奢摩他毗婆舍那清淨修證故前義通上根後義局中下二汝猶下生後示誨又二一防非正落邪經魔事者梵語魔羅此翻殺者能殺人法身慧命故亦名奪者能奪人善法故輔行云古譯經論魔字從石自梁武來謂魔能惱人字宜從鬼又云天魔正以順生死貪五欲退菩提嫉眷屬為事行者宿行魔業今違宿因宿事來遮故曰魔事魔境現前者魔有四種謂五陰天子煩惱死也今所現者皆是於五陰中為天子煩惱之所惑亂唯受陰中云心不欲活有同死魔亦天魔使然耳注因觀五陰而發九境者止觀中凡列十境一陰入二煩惱三病患四業相五魔事六禪定七諸見八上慢九二乘十菩薩初境現餘九待發云云不出九境者且約大槩言之若病患及菩薩境其相則隱二又復下恐得少為足二汝應下興慈演說為三一誡聽二受旨三佛告下正說分二一辨修禪所現魔事流通行門二示持經所得福業流通教門初又二一辨魔二釋疑初又三一通論迷悟二正辨羣魔三總結垂範初又二一明生佛理同經本覺妙明寂照之用也覺圓心體中道之性也二由汝下迷悟事異為二一迷生空界二汝等下悟歸殞裂注但有相似分極之異者若以寂光對破三土從界外次第而說則相似銷同居分證殞方便極果裂實報二汝輩下正辨羣魔分二一總明二別示初又四一修禪契靜經心精通㳷㳷與泯同由唐太宗諱民故此易之二一切下因靜發魔為二一動境界注將出其境者近指欲界遠指非想大樹緊那羅王有經四卷初卷中云王與無量緊那羅等從香山中來詣佛所作八萬四千伎樂王復自鼓琉璃之琴時大千世界須彌山王乃至草木叢林悉皆涌沒如人醉酒不能自持云云二彼等下興煩亂經鬼神者止觀云一切鬼神屬六天管當界防戌故來致惱僉者皆也爾雅云僉同也方言云自關而東五國之都謂皆為僉三然彼下對魔明悟經五陰主人者通舉五陰別指意識心王以為主人四若不下不悟招損分二一落魔屬二如下壞法身為二一舉劣事二彰大損如文二阿難下別示分五一色陰乃至五識陰初又三一示區宇二辨魔事三囑流通初又三一指前離念注欲界粗定者對今妙定貶之為粗準禪門說欲界定從數息入略有三相一粗住二細住三證相證此定時定法持心任運不動云云訶欲離蓋等止觀皆用三諦三昧為能觀之法此與正觀其體不殊但所離猶近故屬方便也二當住下顯今色陰為二一正顯陰相經區宇者谷響云猶言限域也二若目下懸示超相經黯字或作默者誤色陰盡位在相似下文備解三觀其下結妄元後四陰例此二阿難下辨魔事分十一身能出礙經四大不織者因畢竟空亡堅固執故見四大無交織之相下文其身內徹等大意並同二拾出蟯蛔三空中聞法經魄魂意志精神谷響引白虎通云魂魄者何謂也魂猶沄沄也行不休於外而主於情也魄者迫然著人主於性也魂者藝也情以除穢魄者白也性以治內精神者何謂也精者靜也太陽施化之氣也象火之化任生也神者恍惚太陰之氣也今謂意即心王志即心所如云在心為志各言爾志皆所志不同正屬於想也長水云主肝曰魂主肺曰魄主脾曰意主腎曰志主心曰精神未詳四見佛踞臺經毗廬遮那此翻遍一切處寂斯是法身若見踞天光臺合是盧舍那報身之相以唐時譯經法報不分故也法華疏記曾破此義五空成寶色六暗室見物七燒斫無覺如文八遍觀諸界經欣厭者當約淨穢凡聖二義分之九夜見遠方經市井者谷響引管子曰處商必就市井尹知章注云立市必四方若造井之制故曰市井十知識遷變經無端說法此是行人自能說法或聞前知識說法令其行人通達妙義應以藏通別教所詮之義稱之為妙荊溪云前教中權魔亦能說三阿難下囑流通後四陰例此二受陰分三一示區宇二辨魔事三囑流通初又三一指前色盡二若有下顯今受陰為二一正顯陰相經魘本作厭後人加鬼字苑云厭眠內不祥也蒼頡篇云伏合人心曰厭二若下懸示超相二阿難下辨魔事分十一見物生悲二勇志齊佛注陵率謂勇心高率者陵即高也世說云劉麟之為性高率淩誶者莊子雜篇云察士無淩誶之事則不樂釋文曰淩轢誶問也三渴心沈憶四疑是舍那經亡失恆審謂失於平審諦之心也五生無盡憂六生無限喜注七覺支謂念擇進喜輕安定捨初通定慧次三屬慧後三屬定七起大我慢注七慢者出顯揚論昔衛元嵩者谷響云本亡名門人也因法起見罷道為儒而仕於後周見唐高僧傳周武帝姓宇文諱雍不造下皆元嵩諫辭孤山又云世有細人濫學其語心非邪見內唯叨餮遂影附邪魔之蹤熒惑無知之俗率多背佛像以說己法輕佛經而崇己語及貴有位者奴召隸役頤柱氣使則兢兢戰栗趨走不暇及得其言或刻之琬琰或寫之簡牘奢夸珍貴惟日不足及覩佛像佛經輕若草芥以此驗其心進非達道退非邪見唯苟求利養誑惑愚俗欲彼尊崇於己耳嗚呼執政者果以儒道治國則當知此輩乃亂臣賊子之儔安可容也果以佛教治心則當遵佛遺囑且大涅槃經付囑國王大臣篤信檀越見毀法者當苦治之使正法久住即長壽之因也惟執政者從吾之言而正之可矣非從吾之言遵佛之囑也非遵佛之囑行儒之道已昔鄭子産問政於然明對曰視民如子見不仁者誅之若鷹鸇之逐鳥也移於此政以及吾教則佛日重明矣真風再扇矣則是救無量衆生無間獄之苦也其利豈不大哉八輕安自在經無聞比丘亦得少為足反同不學無知資中云無聞此丘觸地皆是以今驗昔信其不誣九撥無因果經一向入空密嚴經云寧起有見如須彌不起空見如芥子注叔世者谷響云末世也持操猶云撿節也畫魑魅者戰國䇿云畫鬼神易為巧圖狗馬難為工今以排去律檢妄談無礙如畫鬼神耳陰陽拘忌者太史公曰嘗觀陰陽之術太諱使人拘而多畏流俗妄說者此又陰陽家流之訛者也孰愈者誰勝也迷蟄者如蟲藏蟄聞雷乃發得其人下哀公問政子曰文武之政布在方䇿其人存則其政舉其人亡則其政息又何待下夫聖賢不生其間必有命世者出焉苟能行斯經之道以訓世其亦命世之儔歟上皆谷響十愛極發狂經陷於王難此是華報當從淪墜果在地獄三想陰分三一示區宇二辨魔事三囑流通初又三一指前受盡經得意生身楞伽第四明三種意生身一入三昧樂意生身三種類俱生無作意生身法華玄義以第一擬二乘入空第二擬通教出假第三擬別教修中通中意者初作空意次作假意後作中意又云別圓似解猶未發真皆名作意當知今經意生即第三種類也注始三漸次等問第八卷中五十五位真菩提路既不取三漸次義今六十聖位何故取之答前據別論今從通說何則若通說者三漸次中義含外凡相似分真之位若別論者從乾慧去方是正明地位之相實而言之但有五十七位五十五位便加乾慧妙覺今通別兼舉故云六十聖位譬如意去下此與玄義釋意不同玄義從因楞伽約果謂捨分段生變易時速疾無礙也若爾智者違經文耶答不違蓋取三昧樂意等謂之作意是則經存兩義前後互出耳二譬如下顯今想陰為二一正顯陰相經寢言者通俗文云夢語謂之寱說文云眠言也二若動下懸示超相二阿難下辨魔事分十一求善巧經口中好言者亦飛精所附之人余九亦爾此名怪鬼者問前云天魔侯得其便今何忽云怪鬼等耶答前舉其主今言其黨又前是通名此是別目二求經歷三求契合經綿㳷者谷響云綿微㳷合也四求辨析乃至九求深空皆如文十求永歲經研幾讀曰機微也易繫辭云極深研幾如遮文茶舊云嫉妬女又曰怒神即役使鬼也或不因師者或時天魔不附人師為其說法也三囑流通為二一舉過別勸注付法藏傳彼第二云阿難欲入涅槃往恆河中流入風奮迅三昧分身為四分一分與釋提桓一分與娑伽龍王一分與毗舍離子一分與阿闍世王云云二同前付囑起第十卷四行陰分三一示區宇二辨魔事三囑流通初又三一指前想盡注準智論下彼第九十二云眠有二種一者眠而夢二者眠而不夢阿羅漢非為安隱著樂故眠但受四大身法應有食息眠覺是故少許時息名為眠不為眠不為夢眠二生滅下顯今行陰為二一正顯陰相二懸示超相可解二辨魔事分十一入無因論注如智論下彼第十一云佛在祇洹舍利弗從佛經行是時有鷹逐鴿飛來佛邊佛語舍利弗汝觀此鴿宿世因緣舍利弗入宿命智三昧觀見此鴿一二三世乃至八萬大劫常作鴿身過是已往不能復見從三昧起佛又令觀未來世此鴿何時得脫舍利弗入願智三昧觀見此鴿一二三世乃至八萬大劫未脫鴿身過是已往亦不能知從三昧起白佛不審此鴿何時當脫佛言復於恆河沙等劫中常作鴿身罪訖得出輪五道云云二入遍常論注并執受心即第八識也本元由處者沇疏具云於此八種本元由處其義既失者若言第三於八種本元由處其義既失者若言第三於八種本元由處計以為常豈可第四又於行陰計常耶所以亦非謂前計已細後計復粗故三入一分常論經我遍十方智論明外道神我即是六識更無異事今於行陰中起計亦是分別事識妄認行陰不動為我恆沙國土者此非恆沙佛剎秪於一大千界內見諸國土耳四入有邊論經於分位中分去聲猶云齊限如計過未相續及八萬劫等是也五入遍計虗論注準婆沙下此但似其流類未可全同計天常住等節疏云外道計無想天為不死天六入死後有相注百論家以識陰為初等如第三記此中與彼不同蓋以五陰為五濁約所破說故前粗而後細也七入死後無相論八入死後俱非論九入死後斷滅論經現前銷滅死已無復此通指七處也十入五現涅槃論經轉依者如第七卷解但此中妄認五處轉生死依涅槃也注此計應從第六外道流出者既不同死後斷滅似同死後有相以不見五處微細生滅便謂安隱現得涅槃橫竪攝屬者攝前橫相屬今竪義一往屬欲界二往通四禪三囑流通經自起深𮓃說文云禽獸蟲蝗之怪謂之𮓃今言心魔自損如彼之怪銷息猶云除滅也注前色受想等且據大節判屬天魔其間不無煩惱之相心見不出見愛二惑者此約通論不可將二惑分對兩陰以行識中除定性二乘外皆邪見故既有見惑任運有背上使即愛惑也若以止觀十境收之正屬見境亦兼禪境五識陰分三一示區宇二辨魔事三囑流通初又三一指前行盡注不牽來報者不感分段生死也經如雞後鳴有本作候鳴沇疏兩解今唯取後二六根下顯今識陰為二一正顯陰相經內外湛明入無所入謂內根外塵無相涉入又根塵不為識之所入二懸示超相二辨魔事分十一因所因執注正取後義者問何故不取資中之說答以其直指真常而為冥諦於義不便但此執見與冥諦相濫耳上因指體即圓元也下因對用既真為妄本能生諸法故對諸法之用立所因之名也二能非能執注彼皆所生即非能也以彼衆生不能生我故三常非常執四知無知執五生無生執經求妄冀果冀亦希望之義謂求外道妄冀之果六歸無歸執七貪非貪執八真非真執經寶媛者爾雅云美女為媛九定性聲聞十定性支佛此即止觀二乘境相三囑流通為二一同前付囑注亦可別指下謂前七是外道第八是邪魔二如是下約證結成又二一顯果人已證二識陰下示因人當證注天台下法華玄文云圓教肉身於一生中有超登十地之義如金光明中十地有虎狼等怖云云三此是下總結垂範為二一結前境以勸諳識經褫魄者褫音雉注驚也者張平子東京賦云奪氣褫魄注曰褫驚也謂奪移神氣驚散魂魄二若諸下示末世以勸恭欽注行之大略下信法二行出多論及德宗廣如止觀第五嘻歎聲也亡子謂逃亡之子前春者谷響云即明年二月也前去之春故曰前春非已過之春也二阿難下釋疑為三一經家敘二阿難問又二一問三義二惟願下請開示經清明心目者心有餘疑如目有微昧今請開示故曰清明作將來眼者亦恐末世同今所疑故三佛告下如來答分二一正答二付囑初又三一示五陰妄想二示因界淺深三示銷除頓漸初又三一總示二別釋三結成初又二一迷真起妄二知妄無因初又二一明真妄二妄無下斥性計經迷因緣者迷猶背也二阿難下知妄無因又二一正違妄因經何況等謂不知因緣是妄而復推度自然為實也亦可不知自然是妄故起推計二是故下結歸陰本二汝體下別釋分五一色經先因父母想生谷響云世有不因交合而因想有胎是知體因想生彌為可驗案于寶搜神記曰漢末零陵太守有女悅郡門下書佐而因於間乃使婢取佐與水而飲之有娠既而生子至能行太守乃見椽更抱兒衆中使求其父兒直上書佐腋推之化為水衆大驚遂以女聘書佐焉以是明之雖有因合不因合之異莫不皆由想乎人見兒化為水之說以為詭譎而不顧百年在世亦同此兒矣攬遺體而成遺體亦水也一旦死滅懷爛仍是水矣果零陵小兒之可驚則衆人盡可驚也彼既詭譎此安得不詭譎乎妄想而生大哉佛說二即此下受三由汝下想經身非念倫下正明融通妄想之義謂身之與念色心兩殊且非倫類汝身何因至與念相應者誠由妄想融通使之然耳又非但融於色身亦乃通諸夢寐故曰窹即想心等四化理下行五又汝下識為二一正明妄想注諸解下沇節圓璿所說皆爾秪就阿難等現前而示者如受陰中云汝今現前順益違損豈是離色之受耶乃至此中皆云汝等其例可解即以見聞為精明者以今文云於身不出見聞覺知若實精真不容習妄斯乃正破阿難用見聞覺知而為精真也那分用動體常之異乎然若云受熏納種在識須指第八若其真精湛不搖處則通前六二阿難下重辨微細經中串習幾者串穿也亦習也幾謂幾微注無明所熏亦見思種子者且約通惑未除凡有有所熏皆見思家種子也如荊溪云未淨六根已來所有王數名見思家王數此其例焉正是粗相者既有憶忘復名妄想非粗而何況至六根淨位此相則滅粗義愈彰矣住人下諸疏之中唯孤山作相似位釋餘皆說為真六根淨真似不辨如雷之發聲同時而應故曰雷同三阿難下結成二汝今下示因界淺深注孤山下此唯約正報釋長水下以依對正釋問二說孰愈答長水為愈準第四云汝見虗空遍十方界空見不分有空無體有見無覺相織妄成名為劫濁又第九云若色陰盡能超劫濁故知今言色者須對依報外色示之記憶忘失者亦可云記如寤忘如寐識體同者如前文云內外湛明入無所入三此五下示銷除頓漸注但此併銷有盡未盡者問夫五陰妄想不出見思且初信斷見二信至七信斷思此圓教粗垢先落之位也今乘悟併銷為是先見後思為復思為復見思雙斷答應有二義若先見後思亦名併銷以此二惑皆遍五陰故當知初信則併銷五陰中迷理之惑二信至七信則併銷五陰中迷事之惑若見思雙斷義亦有憑如瓔珞本業云舍利弗於第六住值惡因緣退入凡夫外道乃至千劫作大邪見及五逆等荊溪云身子於十住中第六心退恐是爾前見思俱斷至六心時見猶未盡今以圓信例彼別住見思俱斷故曰併銷古云下此出後漢列傳魚丕之文丕字叔陵關東號之曰五經復興魯叔陵一往相類者如云此五陰元重疊生起即次第而結也事非頓除因次第盡即次第而解已二汝應下付囑二阿難下示持經所得福業流通教門為二一佛勸流通二衆喜會散初又二一校量施寶福多二顯示持經業勝初又二一問此有三意一遍滿下舉種子多二持以下示福田多三承事下明敬心多以此三多為校量本二答於三多中略舉種子福田自攝敬心施佛七錢田種俱少也二佛告下顯示持經業勝分二一滅惡經能以一念將此法門等真際曰一念者一剎那間心也又一念者始終不移前心後心皆相似故又一念者謂無念耳業障本空万德元具此約理釋前據事論理事相融善自通會今準仁王云一念中有九十剎那故知一念言其少時也然則佛意顯持經力勝亦可俟前心後心始終不移者耶又若約理釋者乃是自行之義非此中利他之意幸哉一念之頃滅惡尚爾況多時乎況終身乎既云諸佛如來語無虗妄不可以別時意趣銷遣斯文般若受持四句勝捨三恆之全身圓覺分別半偈超化百恆之小果用彼詳此不亦如是句偈尚爾況全章乎況盡經乎願諸見聞勵力敷贊成安樂國者以果顯因也即地獄因成安樂因二得福下生善又二一利他得福注教理行果等此用沇疏之義彼云此經有四不思議謂教理行果皆殊勝故且如來藏體理不思議次辨圓通行不思議及說神呪教不思議後明地位果不思議二阿難下自利成道經能誦此經能持此呪即顯密二教也依我教言如教行道謂依顯教行正助二道亦可依顯教行正道依密教行助道又依顯密二教皆行正道二佛說下衆喜會散經皆大歡喜谷響引大論三義故喜一能說人清淨二所說清淨三依法得果清淨今謂前二屬應後一屬機又如次配三寶三皆清淨機應事畢是故歡喜然論釋般若義該三教今唯圓頓粗妙可知豫集解經畢纍載覆讀來學相繼似有緣於此經乎所患前解文節尚疏將恐後昆義路猶壅更欲補助為之乎記慶曆四年赴請永喜住西山蘭若初講法華至五年復講斯典林泉既僻香火多暇因是捉筆以酬先志記成凡數万言折為五卷庶記者聽者不忘圓通簡要之道故題曰熏聞
