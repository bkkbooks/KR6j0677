body:
  text: 吳興沙門仁嶽述起第六卷五耳根分二一觀音正說二昔佛所記初又四一值佛稟教證真引天台云西音阿那婆婁吉低輪此云觀世音能所圓融有無兼暢照窮正性察其本末故稱觀世音又梵語阿縛盧枳帝滋伐羅此云觀自在唐三藏云觀有不住有觀空不住空聞名不惑於名見相不沒於相心不能動境不能隨動隨不亂其真可謂無礙智慧也彼文今觀諸經標名或單云觀世音或單云觀自在唯大悲心陀羅尼經具云觀世音自在而不知梵語有單有具為是譯人去取不同未詳厥旨注流通本經者本謂本門示可通指法華為本經教即世音以初稟教即是耳根所對之境故聞即耳根者此從能聞邊說若約所聞有通有局局取彼佛音教通取一切聲塵之境思修皆能觀之觀者聞非無觀以觀行成時正在思修故應知三慧有橫有竪橫則名字已上位位有之竪則名字為聞觀行為思相似為修三慧具足能得相似分真之定故曰從聞思修入三摩地二初於下依教起修注舊約三慧次第銷之義出沇疏且初聞慧者謂於聞中入流亡所所入既寂動靜二相了然不生此觀聞性返照離緣如是漸增聞所聞盡非唯亡境亦乃離聞二思慧者謂盡聞不住覺所覺空即能覺心思慧為體又觀此覺體性亦無三修慧者謂空覺極圓空所空滅思盡唯修既無能覺亦無所覺證真曰據疏此釋但遣前二不遣修慧空覺極圓等即是釋思慧盡相令助一解最初七句遣聞慧次二句遣思慧後二句遣修慧謂前聞思二慧俱為所空修慧為能空今能所俱遣故云空所空滅孤山長水大節亦同但釋義小異耳節文為四下須知根塵是所破之境理觀是能破之觀以三諦之理即三觀之體故荊溪云諦觀名別體復同是故能所二非二前二如賊後二如兵雖計賊而發兵要賊除而兵息又此四節說有倫次遣必俱時若不然者非頓亡之智非無作之行注文已顯無俟煩辭三生滅下因修獲證注此非屬應蓋言其機者諸師皆作應解唯興福云下合有二悲則謙居學地仰乃俯類凡夫又云仰謂敬法處師悲謂傷己拔彼此善經意也若屬應者如何銷釋與之一字菩薩所證圓通之理下理謂三千三諦之性衆生心佛一體無差迷之則事用確分悟之則真精洞徹永嘉云諸佛法身入我性我性同共如來合此之謂也感應常冥與拔常顯者冥謂冥密顯謂顯露然感應必與拔與拔必感應冥則俱冥顯則俱顯蓋左右言之耳凖智者釋法華普門品以前問答不見形聲密荷深祐為冥益即七難二求等以後問答觀覩色身得聞說法視聽彰灼名顯益即三十三身十九說法也約彼申此則三十二應是顯益十四無畏是冥益四不思議兼通冥顯云云四世尊下由證成用為二一廣談應用二總結圓通初又三一三十二應二十四無畏三四不思議初又三一總標經聞熏聞修者熏謂熏習從喻為名修兼於思三慧備矣起信云如世間衣服實無於香若人以香而熏習故則有香氣今亦如是觀音因中初無淨用由聞如幻金剛三昧而熏習故能成三十二應也入諸國土者若約四土論之應六凡二乘及藏通菩薩但入同居應別圓菩薩則入方便實報感機居同居亦入分段寂光無相三土由之而生天器飯色喻意可解二世尊下別釋分五一應三乘經勝解現圓資中云將登正覺坐道場也今謂勝解即正覺此通分極識如孤山所說而資中云將登者躡上進修無漏言之秪為進修未登正覺是故現身而為說法令其勝解現前圓滿注臣家之鏡下喻分真理能現佛身也王家之鏡下喻究竟理現菩薩身也證真云若初住能現妙覺是本下迹高若妙覺現菩薩等像是本高迹下俱高俱下二句可知此依天台四句分別鈔文問經云現佛身者為劣答若在方便實報定是勝身若在同居或勝或劣云云毱多等者梵云優波毱多此翻近護佛滅度後百年出世得阿羅漢果付法藏傳云毱多於摩突羅國說法降魔已語魔王言我不得見如來色身汝首曾覩宜為我現魔曰仁者我現佛身勿為吾禮即入林中變現三十二相八十種好化為比丘前後圍繞若鵝王趨從林而出毱多見已說偈讚歎不覺為禮魔言何故如是答曰我知世尊久已滅度見此容儀歡喜內發是故禮耳魔復本形歸還天上資加二位者五停心為資糧四善根為加行雖有菩薩等者今謂藏通菩薩雖約凡聖位同人天及以二乘而現身說法必須有異若然則應取前諸菩薩文通收四教之機不亦可乎但隨教相明勝解現圓於義無咎二若諸下應天道注四禪皆有王者次第禪門云佛於仁王經說十八梵亦應有民主之異又云四禪中有大靜王而佛於三藏中但說初禪有大梵王者以初禪內有覺觀心則有語言法主領下地衆生為便上地無此故不別出初禪之頂者初禪有三天謂梵衆梵輔大梵也經帝釋者梵語釋迦提桓因陀羅此言能作天主今略云帝釋蓋華梵雙舉也大自在天者智者云有人以為第六天而諸經多稱大自在是色界頂天釋論云過淨居天有十住菩薩號大自在又十住經云大自在天光明勝一切衆生涅槃獻供大自在天最勝故非第六天也舊以前自在天為第五大自在天為第六又慈恩以自在為夜摩兜率大自在為化樂他化注散脂者具云散脂修摩此翻為密未知此中定是何等此智者之語雖未可定下是孤山之辭經四天王者金光明疏云上升之元首下界之初天居半須彌東黃金埵王名提頭賴吒此云持國南琉埵王名毗留勒叉此云增長西白銀埵王名毗留博叉此云雜語北水精埵王名毗沙門此云多聞國大子者谷響云亦如世間太子入則監國出則撫軍三若諸下應人倫經人王者普門品謂之小王智者以輪王粟散等解之今亦應爾長者者淨名疏云有長人之德也風俗通曰春秋之末有賢人著長者一篇謂年耆德艾事長於人以為長者居士者據普門疏以多積財貨居業豐盈謂之居士今經之意有似不然谷響引鄭康成云居士者道藝處士此義同焉注三台者亦曰三階每台二星凡六星名泰階六符符者星之驗也黃帝泰階六符經云泰階者天之三階也上階謂天子中階謂諸侯公卿大夫下階謂士庶人也今通云三台正言其中耳州牧者牧養也謂養於民也尚書周官曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯淨行者普門疏云劫初種族山野自間故人以淨行稱之六宮者谷響引鄭康成注云前一宮後五宮也五者后一宮三夫人一宮九嬪一宮二十七世婦一宮八十一御妻一宮凡一百二人妻因夫榮者即夫尊於朝妻榮於室也四應八部經若有諸天普門疏云上列大威德天今更舉二十八天或可星宿掌人間者也諸龍者此有四種一守天宮殿持令不落二興雲致雨利益人間三地龍決江開瀆也四伏藏龍守轉輪王及大福人藏也肇師但出三種不出天龍藥叉者此有三處海嵨空中天上傳傳相持不令食人佛初成道及說法傳唱至天乾闥婆在須彌南金剛窟住矣什師云在寶山中住天欲作樂身有異相阿修羅有千頭二千手萬頭二萬手或三頭六手已上皆普門疏五若諸下應雜類注有形如休咎精明等此取十二類生配之則與孤山所解不同若觀下文明神呪功能中云從第一劫乃至後身不生有形無形有想無想如是惡處有似不攝色無色界更侯講者詳而辨之三是名下結成注互有出沒者此經有四天王并國太子及女主國夫人命婦大家人非人是出也普門雖有人非人智者以為結八部之數無長者等歸女并迦樓羅及執金剛神是沒也普門出沒反此可知或曰下皆古師釋普門品意也二世尊下十四無畏分三一總標二引釋為三一觀聲得脫經由我不自觀音以觀觀者資中云由我不觀所聽音聲但觀聞性也真際云由我不自觀音不循前塵也以觀觀者用無緣之慈觀彼世間觀音之者也今謂沇釋二句全失節釋下句則是上句亦非注文顯矣不旋踵者言其速也猶云不轉足之間耳罔識聞熏者謂無聞慧熏習之力也問若爾散心稱名應無感應耶答今順經文以觀觀者故須正取觀慧為機因此䇿其怠者及遮其謗者故云罔識等也然有散心感應者亦由過去積善或是在至誠之所招致必非淺植輕念者能通聖應傳曰小信未孚神弗福也菩薩利物豈不如之是猶爾孟子曰仁之勝不仁也猶水勝火今之為仁者猶以一杯水救一車薪之火也不熄則謂之水不勝火此又與於不仁之甚者也今借此為譬二遠害隨求為三一免七難注準天台下普門疏約觀行釋火難火難有三種一果報火如阿鼻鬲子八萬四千內外洞徹上下交炎乃至劫盡須彌洞然諸天宮殿悉皆都盡初禪已下無免火災二修因惡業火隨有改惡修善之處若五戒十善多為惡業所燒故經云燒諸善根無過瞋恚雖生有頂頭上火然三煩惱火若二乘人厭惡生死見三界因果猶如火宅四倒結業煙𦦨俱起乃至菩薩並為五住煩惱之所燒害他皆倣此者水難三種果報水至二禪餘二同上彼羅剎難中以黑風為難由亦有三種果報風至三禪余二同上乃至七難皆有觀行三義須者尋之經入諸鬼國即普門品羅剎難也則諸幽暗者谷響引樂記云明則有禮樂幽則有鬼神二離三毒注二乘下即界外三毒之相菩薩下三句如次配貪瞋癡三滿二求經立大圓鏡空如來藏上句立智下句言理智一合無復分張注地獄指輕繫欲天指地居三持名獲福經百億日月準俱舍頌云四大洲日月蘇彌盧欲天梵世各一千說名小千界此小千千倍說名一中千此千倍大千皆同一成壞是則小千界有一千日月中千界有十億日月大千界有萬億日月故南山云三千世界其中四洲山王日月等則有萬億之所是也今大千云百億者恐西天數有大小應以一百小億為一大億乃成百億日月修法垂範者修法約自行除耳根外隨於何根修習行法也垂範約化他即以自行垂為摸範轉化於他也注法華亦有此之校量彼疏云圓人唯一偏人則多格六十二億偏菩薩等一圓菩薩也又別行疏云一多性不可得無有二相一則非一多則非多同入實際實際正等是故無異法華論云畢竟決定知法故法即法性真如法身是故六十二億與觀音無別及觀今經方曉彼意者孤山意謂今經校量功德與法華是同但智者時此經未至不知觀音耳根勝於餘根故也嘗試議之法華為流通本經故智者二疏約待絶二妙之義互顯其文格偏等圓相待義也實際正等絶待義也況復本論以法性釋等記可違之今經為對諸聖說圓通本根校量勝劣誠如孤山所解然則兩經義趣不可全同儻或一向將此例彼豈唯見智者未曉抑亦覩天親弗明五品四依便成虗說若擕李所釋純用別疏義銷今經文此又與孤山敵體相反過猶不及二師有焉明識之士更請商略三是名下結成三世尊下四不思議為二一總標二列釋又二一顯應化功名二成機感福樂初又二一功用經妙妙聞心心亦性也此性絶待猶老子曰玄之又玄故云妙妙首臂目數皆至八萬四千者應表八萬四千法門以破八萬四千塵勞也二名聞經由我聞思者略於修也下文云由我修習又略聞思蓋影互相顯耳如聲度垣者聞思如聲六塵如垣度猶脫出也二成機感福樂又二一求福二得樂注有以慈悲等者長水疏也二佛問下總結圓通二世尊下昔佛所記經由我觀聽者約所聽言之即世音也注悲華經彼云往昔過恆河沙阿僧祇劫此佛世界名刪提嵐劫名善持有轉輪王名無諍念有一大臣名曰寶海是梵志種生一子有三十二相八十種好出家成佛號曰寶藏輪王千子第一太子名曰不瞬請佛及僧終竟三月奉諸供養太子願言我之所有一切善根盡回向佛道願我行菩薩道時若有衆生受諸苦惱恐怖等事退失正法墮大暗處憂愁孤窮無救護若能念我稱我名字我天耳所聞天眼所見是諸衆生若不得免斯苦惱者我終不成阿耨菩提時寶藏佛即為授記汝觀天人及三惡道一切衆生生大悲心欲斷衆生諸苦惱故欲令衆生住安樂故今當字汝為觀世音乃至云無量壽佛般涅槃已第二恆河沙阿僧祇劫後分初夜分中正法滅盡夜後分中彼土轉名一切珍寶所成世界所有種種莊嚴安樂世界所不能及汝於後夜成等正覺號遍出一切光明功德山王如來應供正遍知等二爾時下廣現符瑞經金剛三昧此應通指圓定名為金剛亦首楞嚴之異名也如下文明位中云是種種地皆以金剛觀察等孤山別指初住以上能破堅惑蓋約多分說之梵唄詠歌者谷響云具言唄匿或曰婆陟此翻讚歎乃是以梵天之音讚歎詠歌於三寶也四於是下文殊簡辨為三一如來告敕二文殊說偈三大衆獲益初又二一會通前說經彼等修行實無優劣斯即會通諸聖於十八界及以七大修行所證圓通是同故無優劣亦可一往以理融事未論被機難易是則最初方便亦無優劣若約開權說之即法華云汝等所行是菩薩道也前後差別者此據諸聖各各修證久近不同故云差別如諸菩薩於過去劫得圓通者久也諸聲聞人於現世中得圓通者近也又於過現各有前後對文可見注小教者藏通也通教雖是大乘初門今就不得意者同前藏教所證偏真耳大教者別圓也法華玄義明四教各有四門藏通二教能通之門有八所通之理無二即偏真也別圓二教能通亦八所通唯一即中道也而此下真中是理俗諦是事以理無所存遍在於事故於事達理者唯觀十八界等真中而已矣但法華以前真中未會別圓菩薩知中異真以真為權藏通三乘謂真同中以真為實今敘昔既畢還用法華之意開而示之故曰彼等修行實無優劣斯乃真中二二理皆如來藏也前文云令汝會中定性聲聞等皆獲一乘寂滅場地此諸聲聞說圓通者其定性之明導歟全分無差者如荊溪明法華開權意云方便諸乘皆悉不知無始藏理一心三法故各於一法少分起計並謂究竟今如來善巧方便種種調熟還示衆生本有覺藏使大小咸知昔覆今顯名之為開彼文是知少分開已無非會通一心三法若以圓位收之即內凡十信也故下文除乾慧地從初信以上皆與如來法流水接乃至五十五位同名真菩提路前後符合妙旨昭然問此經開權為秪開聲聞亦開菩薩耶答聲聞證權理故須開之菩薩證實理不須開已縱有離俗顯中因雖用權果必同實然其聲聞或於方等般若密入中者亦不須開菩薩敘昔得小果者亦有開義又若據法華開顯之後諸聲聞人已無執真之見今以權引實所敘小果佛重開之其實開法不開人也二我今下敕令別簡經誰當其根此問阿難等現在之衆於諸聖所說誰人與汝根性相當二文殊說偈為三一申敬二正說分二一廣前會通二顯今別簡初又二一略明真妄二會通修證初又二一真本圓妙注寂而常照者澄湛故寂圓融故照也照而常寂者經文上句即寂而照故曰澄圓下句即照而寂故曰圓澄更以妙字助顯其義若約三諦言之圓即空也澄即假也覺性即中也節疏謂下句牒釋上句亦猶將本覺明妙釋性覺妙明義必不爾二無明下妄分迷悟又二一迷生諸法注妄生照用而形所相者照即能見相所即境界相節公為長者問孤山所釋於義何短耶答以生所之義闕能生之妄故雖云由迷本明而起元明其如釋經元明照字但言即上本明之性也況復元明已是於照更言照者理似煩重所以短之經想澄成國土知覺乃衆生謂情與無情皆妄想所成如天親說有分別及無分別皆名為識有分別名識識無分別名似塵識今想澄成國土即似塵識也知覺乃衆生即識識也宗唯識者但謂此識不與真如同以一心為源故說真如無覺無知凝然不變不許隨緣唯談八識生起諸法由是與法性宗義同水火若曉今家破四性已隨宜而說情通妙契諍計咸失注世界國土為異者亦可世界是總國土衆生是別若爾則唯以國土為異不同第四卷中別無國土之名即以世界為異也有漏兼有情者以漏謂漏失屬煩惱故律云癡人造業開諸漏門是也二漚滅下悟滅諸相注三有含情器者有因有果故婆沙以苦集二諦為三有體二歸無下會通修證此是文殊廣前佛說彼等修行實無優劣而為頌也人不見之但言文殊顯性不推功於佛者失焉注私謂下兩番解逆順義並以背性為逆了性為順此如荊溪修性不二門二初心下顯今別簡為三一標簡所以注日劫相倍如第四卷彼又云十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣但汝下劣未能於中圓自在慧故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨須知此中簡辨即是酬前所許由佛世當機及滅後得益緣在文殊是故奉命代佛宣揚耳二正辨是非分二一簡諸聖非二辨觀音是初又四一簡六塵經色想結成塵等簡優波尼沙陀所悟色塵也講者當取前說對銷此文乃至諸聖圓通各有名相避煩不銷但伊名句味者谷響云伊惟也皆語辭耳字或作依者誤也注名詮自性至為二所依出唯識論古人以文為味者據慈恩意不許此義故百法疏云若依古譯翻文為味但是所顯非能顯也問陳那下孤山疏在說圓通前廣有料簡已如前記今略注此貴易見耳彼又云前白佛則陳那居先意明聲為教體欲扶成於觀音也此簡辨則陳那居次意顯法相不亂貶同非於諸聖也此亦深旨豈得不知經香味觸塵皆合中知離則不覺簡意大同憑塵必有所謂迦葉修滅盡定時必依法塵為所緣境既有能所斯屬作意故非圓通二見性下簡五根經四維者孤山云維即是方如云八方八維也且如來前明六根功德云而此界性設雖十方定位可明世間秪目東西南北上下無位中無定方四數必明與世相涉請觀佛語秪約四方以涉三世不言四隔豈可文殊特違佛語須知譯者取其通義以變其文也虧一半者以不足為半非以中分為半支離匪涉入者支分也涉入亦交義謂鼻息分離不能同時交相出入故湛了終無見者沇疏云若湛了時意不可見彼以湛了為不雜亂與今注異義似不然三識見下簡六識經結本稱非相此於三和中責其本因元無自相故注則為非住謂非是妙定之所住也經說法弄音文說文云弄玩也下句既云名句非無漏是則兩句義含四法蓋影略互舉耳開悟先成者資中云說法悟道先須修定然後發慧故知說法為先成者也孤山云此約自說悟道古人翻作聽法以解先成誤矣注識在其中者以波離持戒從身識悟道故經神通本宿因六神通中漏盡通是意識內證前五通是意識外用斯由目連宿因成熟從三迦葉邊聞法而發且非初心入道軌則是故簡之念緣非離物者谷響云小乘修通天眼則緣障外色修之天耳則緣障外聲修之餘通皆然今謂身如意通中轉變他身及世間所有隨心自在亦是念緣非離物相注作意者謂一心秪能作一不同大乘無記化化通也四若以下簡七大經如如非覺觀謂如如之理非由水之覺觀所能契會觀識非常住者初心以識為境則念念流動入道良難故注古謂者慤疏也彼長吁下又云進逢迍私銜悒悵二我今下辨觀音是為二一辨根緣注教體應具等備如說題二良哉下示人法分二一歎能說人經得大自在力無畏施衆生上句自行得脫不為三惑所縛也下句利他起用施十四無畏也梵音海潮音者夫觀音之名音屬所觀本在於境及在於機菩薩既以此為名故就其名假喻而歎云梵音等也此歎菩薩之德非歎音聲纂要釋海潮音為警告雄音者謬矣二我今下示所說法分二一明聞性二明行相初又二一聞性圓通經靜居者居坐也如禮記燕居間居然心念紛無緒說文云緒絲端也言心念紛亂如絲之無端注用有時方下明常真實來意也孤山長水皆以三真實文分為三科今所不取須知下文說常秪是成今圓通義耳二音聲下聞性常住經覺觀出思惟證真云覺觀即尋伺二法是發語加行覺粗觀細也思惟即妄想念慮與覺觀體別謂覺觀是語加行受想是心加行如經云念想觀已除言語法皆滅如是尊妙人則能見般若二今此下明行相為四一斥迷文有八句初二句欲令衆生從聞起行故先言此土聲論宣明次四句正斥迷妄後二句結妄顯真即躡上文斥阿難意結而顯之三阿難下警悟注金剛空也者能摧萬有故佛母中也者能生種智故三聞非下示修四一根下顯證為三一正明斷證經聞復翳根除者復其本聞也分破無明故名為除塵銷覺圓淨者銷義同前覺圓淨即分真智也淨極光通達謂真智究竟也若心起見則有不見之相心既離見即是光明遍照之義二如世下重喻縛脫又二一喻經要以一機抽機謂機關雖轉動如人無主無宰故智論云佛所說法皆無有我亦無我所但諸法和合假名衆生如機關木人雖能動作內無有主若觀上文云幻作諸男女似非木人恐是幻術使其木人故見諸根機動之相注一機即耳根者如於木人抽斷耳根轉動之機則諸根動作一時俱息二六根下合經休復者谷響云休善也善復其性也三塵垢下結成圓極三大衆下總勸修證為二一勸當機經旋汝倒聞機沇疏云機者根性也今謂亦應帖前抽機之喻故此云耳二此是下示同範初二句總示十方現在諸佛如前觀音說圓通後佛與十方微塵如來交光相羅者是也次過去下別示三世修證之人可見三誠如下詰酬又二一據佛意總結前說注苟他土下如維摩詰問衆香菩薩香積如來以何說法彼菩薩曰我土如來無文字說但以衆香令諸天人得入律行菩薩各各坐香樹下聞斯妙香即獲一切德藏三昧即鼻根利也又佛告阿難或有佛土以光明而作佛事有以衣服臥具而作佛事即身根利也有以飲食而作佛事即舌根利也有以相好而作佛事即眼根利也乃至或有清淨佛土寂寞無言無說無示無識無作無為而作佛事即意根利也斯由諸佛轉物為己於法自在隨諸衆生應以何法而入律行用為佛事二頂禮下願羣機皆入此門三於是下大衆獲益注幾乎儔昧幾乎聲近也左傳太史克曰顓頊氏有不才子不可教訓不知話言告之則頑舍之則囂傲狠明德以亂天常天下之民謂之搗杌杜氏注謂也檮杌頑凶無儔匹之貌今言阿難至此若未有所證則近於檮杌之蒙昧也住第十地者涅槃云第四依人名阿羅漢斷諸煩惱住第十地取果之比輩也春秋音義作必利反二阿難下明助行為三一經家總敘二大悲下阿難述請又二一述已發心注度人為先即衆生無邊誓願度應世為本者瓔珞云具足十號名世中尊故知十號皆從應世而立也二世尊下為他請法經邪師說法者如梁肅止觀統例云去聖久遠賢人不出庸昏之徒含識而已至使魔邪詭惑諸黨並熾空有云云為坑為穿有膠於文句不敢動者有流於漭浪不能住者有太遠而耳心不至者有太近而我身即是者有枯木而稱定者有竅號而稱慧者有奔走非道而言權者有假於鬼神而言通者有放心而為廣者有罕言而為密者有齒舌潛傳為口訣者凡此之類自立為祖繼祖為家反經非聖昧者不覺今阿難請意謂當爾之時恐諸衆生為彼所惑云何令其攝心入定等三爾時下如來宣示為三一受請二阿難下奉教三佛告下正說分二一為離魔業教持淨戒二為除宿習令誦神呪初又二一通舉三學注毗奈耶此云律谷響云以此方法律之名翻彼土奈耶之語律者詮也詮量輕重犯不犯等風俗通曰皋陶謨虞造律律訓詮訓法尚書大傳曰丕天之大律注云奉天之大法法亦律也二阿難下別明四重為四一淫戒乃至四妄戒初又三一標戒德孤山云大乘則殺戒居初慈心為本故小乘則淫戒居初人多喜犯故今扶小律以淫為初若爾何故殺居第二答小乘四重唯制殺人犯者既稀故居盜後今制殺畜須居盜先問小乘若定以淫戒居初者五戒何故不然答四重制僧五戒制俗故不同也大論云淫欲難不惱衆生心心繫縛故為大罪是以戒律中淫欲為初白衣不殺戒在前為求福故二汝修下明持犯分二一誡犯二勸持初又二一誡現前經上品魔王等沇疏云功德深者為上品淺者為中下魔不斷欲而修定作福以邪定力報得五通以有漏福生天魔界今謂經文但云縱有多智禪定現前如不斷淫必落魔道何須別以邪定漏福解之應知秪約比丘等修正定者借使得入觀行位中若不斷淫正翻為邪即同魔業下殺戒文云是食肉人縱得心開似三摩地皆大羅剎其意亦爾但隨定力三品分之暫得生天天報若終還墮地獄如第八卷云受魔福盡墮無間獄是也注且落魔鬼等道此對下文通說二我滅下斥滅後經落愛見坑者愛義可知見者如為衆生說行淫欲非障道法或復銷說淫欲是道等二汝教下勸持分三一正勸經先斷心淫長水云此戒雖與小乘名同而持隨有異此則一一內防心念輕重持彼則事遂緣成輕重隨戒今謂先斷心淫乃防萌杜漸之意非謂赴心便同初篇一例結罪如大經云言語嘲調壁外釧聲男女相追皆汙淨戒天台菩薩戒疏指此為汙定共戒又云稱歎摩觸等皆是淫戒方便悉犯輕垢當知大經云菩薩持遮制戒與性重戒等無差別者蓋慎小過如護夷愆璿師之說人多惑此二是故下示損又二一喻二汝以下法三必使下顯益經斷性亦無者作犯既息止持亦亡三如我下結邪正注此翻惡者或言殺者肇師云斷人善根故名殺違佛亂僧罪莫之大故名惡二阿難下殺戒為三一標戒德二汝修下明持犯分二一誡犯二勸持初又二一誡現前經鬼師所類切將也二我滅下斥滅後又二一總斥二阿難下委示又二一指開經食五淨內孤山云諸律並明魚肉為食唯楞伽涅槃及以今經悉唱斷肉何邪答說法被機事有頓漸定慧既爾戒律亦然故梵網頓制對別圓機久斷食肉但鹿苑以來毗尼漸制對藏通機故開三淨化道將終則收漸歸頓於是三經俱唱斷肉楞伽且制藏通菩薩此經則兼制三乘故云清淨比丘又諸菩薩於岐路行不踏生草等洎至涅槃更獨制聲聞殷勤告示若不了四教宗旨云何銷會一期開制之文云云注各開正罪及前後方便谷響云於見聞疑中各說三相且見中三者謂見牽畜去時乃至見彼持刀臨殺時名前方便見正殺時即根本正罪見殺已歡喜名後方便不見此三名為淨肉聞三亦爾疑中三者初瞥爾舉心名前方便分別思惟疑為己殺名根本正罪疑已歡喜名後方便無此三疑名為淨肉經地多蒸濕者谷響引漢書張騫傳曰身毒國鄧展云毒音篤李奇曰一名天篤則浮屠胡是也顏師古曰即敬佛道者在大夏東南大夏國名可數千里其俗土著有城郭常居不隨畜牧移從也著音直略反與大夏同而卑滋暑熱其民乘象以戰其國臨大水焉西域記所說略同而皆言暑濕二奈何下訶後犯二汝教下勸持為三一正勸二是故下示損又二一喻二清淨下法經不踏生草者草本無情外計云有佛遮其謗故制壞生清淨戒者尚兢持之況有情之類乎三若諸下顯益經不服東方絲綿絹帛資中云西國指此方為東彼尚不許雜野蠶綿作新臥具況有家蠶律中若有犯者斬銼塗埵終不衣也酬還宿債不遊三界者長水云經語倒也百穀者珙鈔引物理論云梁者黍稷之總名稻者粳糯之總名菽者衆豆之總名三穀各二十合六十蔬果之實各二十合為百穀三如我下結邪正三阿難下盜戒為三一標戒德二汝修下明持犯分二一誡犯二勸持初又二一誡現前二我滅下斥滅後又二一總斥經潛匿姦欺者偷賊之心也稱善知識者詐僞之名也若據各自謂已得業佛時為婆羅門博通典藉教五百童子因王設會請佛及僧有一比丘病不能赴佛及大衆食已還時為病比丘請食過梵志出梵志聞食香美便興嫉妬曰此髠頭沙門正應食馬麥不應食此餌饌之供告諸童子童子曰此等師主亦應食馬麥佛告舍利弗爾時婆羅門則我身是五童子今五百羅漢是病比丘即彌勒菩薩是以是因緣我與卿等經歷地獄無數千歲今雖成道爾時殘緣故於毗蘭邑食馬麥九十日也又中本起經明舍衛國隨蘭郡有婆羅門名阿耆達多請佛與五百比丘三月供養時婆羅門為天魔所惑耽荒五欲退入後宮其既饑人不好道佛與比丘各且分衛三日空還時有馬師減麥飯佛及比丘等云云二汝教下令斷現業二是故下示損經漏巵者谷響引顏師古注漢書曰巵飲酒圓器也三若諸下顯益經施餓衆生寶雲經云凡乞食分為四分一分奉同梵行者一分與窮乞人一分與諸鬼神一分自食必使身心二俱捐捨者上有人等二句是捨心下身肉等二句是捨身文之間錯也亦雖略足以蔽諸而偏損稱善知識者將非如來懸鑒末世其徒實繁耶持此經者當以自有二我教下委示又二一明正行經不自熟食梵網經自手作食犯輕垢罪律文犯墮二云何下責非法經裨販者纂要云裨附也謂附佛法以自活命劫非出家具戒等沇疏引涅槃邪正品云我滅度後是魔波旬漸當壞亂我之正法乃至作比丘比丘尼像及阿羅漢等形以此有漏之身稱是無漏乃至說言無四婆羅夷十三僧殘二不定法三十捨墮九十墮四懺悔法衆多學法七滅諍等無偷蘭遮亦無五逆等罪及一闡提乃至若犯如是等罪亦無有報如是諸並是魔說云云二我滅下勸持為二一正勸又二一勸酬宿債經燒一指節荊溪釋法華藥王本事品中云有人問律制燒身得蘭燒指得吉此中讚燒其事如何今為答之大小開制教法不同小制結過大制令燒故梵網中若不燒者非出家菩薩豈獨令俗而不制道故知順小行易不燒何難從大誡難燒乃不易世以不持為大則大小俱傾注興起行經彼云佛昔於比分二一誡犯二勸持初又二一明聖不自言二斥言必是妄初又二一正明經終不言等應以終不二字貫下四句輕言未學謂終不容易說示於他二唯除下簡示注南嶽之言鐵輪等谷響云南嶽臨終謂其徒曰吾一生望入銅輪領徒太早損己利他今但鐵輪耳瓔珞以六輪喻位鐵信銅住銀行金向水精地摩尼等南嶽六根清淨即圓十信位也智者臨滅謂智朗曰吾不領衆必淨六根以損己益他但居五品求那跋摩此云功德鎧罽賓國王之子宋文帝時來于建康臨終作梵語說偈付弟子阿沙羅寄歸西土文帝令譯乃言於闍婆林邑證得須斯兩果至死反屈二指以表之真觀錢唐天竺寺僧當墮文帝時及死反屈三指表證三果各如本傳此之四師皆陰有遺付也二云何下斥言必是妄二汝教下勸持為三一正勸二是故下示損經噬臍者譯人取左傳文潤之魯莊公六年楚文王伐申過隥鄧祁候曰吾甥也祁諡也姊妹之子曰甥止而享之騅甥養請殺楚子皆鄧甥仕於舅氏也鄧候弗許三甥曰亡鄧國者必此人也若不早圖後君噬臍若齧腹臍喻不可及三若諸下顯益三如我下結邪正起第七卷二為除宿習令誦神呪為二一結前生後二立壇誦呪初又二一結前二生後初又二一律儀既淨經一切枝葉者四葉如根本十三僧殘等如枝葉前約破戒壞其善根則喻云如人以刀斷多羅木今約持戒滅其惡本故喻云自不能生一切枝葉心三口四者即僧殘等業行之體也亦攝四棄前後方便然貪瞋癡俱生之惑非定慧無以伏斷此中且就與餘篇俱者言之蓋止其粗相也成論云戒如捉賊定如縛賊慧如殺賊應知三障皆名為賊持戒所投正在業兼於煩惱耳注或舉總數者總雖云四別在後三二阿難下魔事不生經心尚不緣下長水云既與定慧相應色香味觸無非實相今謂不爾請看上文何必探取定慧說之二若有下生後又二一勸誦神呪經宿習者通論則該四重等一切惑業以無始來熏習成種故別論則正語淫習以欲界凡夫最難防慎故何以明之如下文特指阿難與摩登伽恩愛習氣又壇室中令置烏芻瑟摩之像由此聖者宿多貪欲因觀暖觸而得圓通故又前阿難遭淫所攝佛敕文殊將呪往護而不用餘呪者得無別意乎佛頂下呪名如第八卷解二且汝下顯除宿習經歷劫因緣者摩鄧女經云阿難昔五百世曾與此女而為夫婦彼小乘經蓋言其近耳我一宣揚者文殊所將是佛敕故二若有下立壇誦呪分二一略明二廣說初又二一方便二正修初又二一持戒經要當選擇戒清淨者四分律云弟子知和尚犯或知不應如是人邊受亦知雖受不得戒如此具知則不成受反上成也南山云餘之九師律無正文準可知也若梵網所說須於先持菩薩戒法師前受若千里內無能授者得於佛菩薩形像前自誓受戒而要見好相二戒成下誦呪注百八煩惱節疏云苦下具一切集滅離三見道除於二見上界不行恚并十俱生及十纏成一百八也二然後下正修為二一行儀二感應經我自現身下證真云凡入道場若不依天台止觀但恐邪正難明彼論即是修首楞嚴三昧行法學此教者切宜覽之二阿難下廣說分二一建道場二說神呪初又三一致請二佛告下正說為三一立壇場經蘇合等珙鈔引續漢書云蘇合出大秦國合諸香煎其汁謂之蘇合廣志亦云出大秦國或云蘇合國國採之笮其汁以為香膏乃賣其滓或云合諸香草煎為蘇合非一物也精異記云宋時有賢士死滿棺實以蘇合香賊發其冢經年林中香氣不輟薰陸者南方草物狀曰出大秦國海邊有樹生於沙中盛夏樹膠流沙上夷人採以貸之南州異物志同唯云狀如排膠金者鬱金草也周禮春官鬱人採取以和鬯酒說文曰金百草之華遠方所貢芳物鬱人合而釀之以降神也宗廟用之零陵者南越志云零陵香土人謂為燕草藝香說文曰藝草似苜蓿淮南說藝可以死而復生雞舌者五馬州出雞舌香南州異物志曰是草萎可合香箋曰外國胡人說衆香共是一木華為雞舌香也方圓丈六為八角壇者纂要云一角二尺二八十六為一丈六也今謂若爾則徑有五尺三寸許耳準下文壇中所設供具并諸食器各各十六是則壇量太窄當取徑有丈六正得其宜如方等行法亦令作壇縱廣一丈六尺至若十人圍壇誦呪方堪行道此不難見何以誤談注除地者除掃也鄭注禮記云封土曰壇除地曰墠場地者國語云壇之所除地曰場起土即封土也鄭玄云封者起土界也二壇心下陳供具分二一壇場中間二壇室四面初又二初一期所奉經八月露水谷響云得陰氣之正也取八圓鏡各安其方者長水云壇雖八角上下為十以應圓數以下文有懸鏡相對上下交光等今觀下文秪云又取八鏡覆懸虗空還成十六之數若取覆懸及八方用表上下於義不便二每以下二時致享經兜樓婆香舊云白茅香也注字或作響谷響引祭義云響者鄉也鄉之然後能饗焉注云中心向之祭乃見饗二令其下壇室四面又二一設像經藍地迦者纂要云青面力士也軍荼利等未見所翻頻那夜迦舊云頻那是豬頭夜迦是象鼻此二使者也注東嚮者如第一卷云此大講堂洞開東方是也右尊左卑者如智論以身子為佛右面弟子目連為佛左面弟子二又取下懸鏡經使其形影重重相涉蓋表如來藏理事交徹一為無量無量為一三於下示誦儀分二一七別行二百日端坐初又三一正修注十大願等梵網云若佛子常應發一切願孝順父母師僧一願得好師二同學善知識三教我大乘經律四十發趣五十長養六十金剛七十地使我開解八如法修行九堅持佛戒寧捨身命念念不去心十若一切菩薩不發是願者犯輕垢罪又云若佛子發是十大願已持佛禁戒作是願言寧以此身投於熾然猛火大坑刀山終不毀犯三世諸佛經律與一切女人作不淨行等云云二至下顯益又二一見佛修定二能令下因定獲益三阿難下斥失注行此法時十人已還天台依之經有明制不可踰也世有修法華等行者或多增人數或長延日限廣邀士女來會香華止存誑俗之心寧為感聖之道至有燒身臂指先告四方縱不苟財亦成沽譽內盲理觀外掇譏嫌如此師徒豫見之矣大經云有四種法為大涅槃而作近因一者親近善友二者專心聽法三者繫念思惟四者如法修行若離四法勤修苦行得涅槃者無有是處彼誡但修苦行實求涅槃者尚為不可況沽譽乎況苟財乎真修行人請思此語二從下百日端坐又二一正修此與止觀所說九十日常坐一往是同但今兼前三七日行法為異故下私注中判屬半行半坐三昧應知正修首楞嚴定亦如普觀云端坐念實相妙勝定經云但能直心坐禪即是第一懺悔也問前科經文從持戒誦呪以來俱名助行今端坐修定豈非正行耶答前乃分其大綱不可責其細目況今略示坐儀日限更不委明定相圓師亦科為助行義合如之二有下獲益三汝問下總結注然所誦呪等豫嘗有此經禮誦儀一卷以備早暮熏奉之或須者行之二阿難下說神呪為三一述請二宣說三護持初又二一阿難正請二于時下大衆佇聞二爾時下宣說分三一現化佛經肉髻者應法師引無上依經云頂骨涌起自然成髻也畏愛兼抱者谷響云畏金剛擎山持杵愛如來坐華放光由茲二事兼并懷抱注王索先陀婆出涅槃經菩薩品五不翻下谷響云一祕密故不翻即陀羅尼是也二多含故不翻謂薄伽梵是也三此方無故不翻如剡浮樹是也四順古故不翻謂阿耨菩提等實可翻之但摩騰以來存梵故後皆倣之五生善故不翻如般若尊重智慧輕薄故存梵也此之五義乃玄奘述之出唐續高僧傳四例者一翻字不翻音諸經呪詞是也二翻音不翻字如華嚴中𭮐字是也以作此方万字音翻之而字體猶是梵書故三音字俱翻經文是也四音字俱不翻西來梵夾是也此之四例贊寧述之出皇朝高僧傳二說神呪三阿難下顯功能分二一約果人以顯驗二約因人以勸持初又二一廣說注私謂此說下夫呪是密語豈下凡所知若據前引天台所明則長水之說固難信用蓋璿師見有呪本後人擅注其語故茲判釋又云下嘗更議之縱若從唵字去方是正呪亦須誦前歸命等文必也後之呪辭呪前所為耳亦不可但持數句而已又若令每一時全誦一百八遍借使利舌聖力加之亦不能於一時之中誦滿其數況其鈍者乎又世有誦者改轉音字謂之梵念十有九異孰為真言詰其所由或曰傳之於梵僧或云習之於譯人者且梵僧之音奢切何驗譯人之學疏寧奚憑豈可極量誦而有乖雲峯翻而未當且翻梵為華如翻錦綺背面雖異文彩無殊若此方文字絶無梵音者則注而及之如薩跢弊是也例知餘字之音不可率爾擅改但依現本至心受持用破疑情以彰靈感也注灌頂經大橫有九彼經第十二云一者橫病二者橫有口舌三者橫遭縣官四者身羸無福又持戒不完橫為鬼神之所得便五者橫為劫賊之所剝脫六者橫為水火焚漂七者橫為雜類禽獸所噉八者橫為怨讎符書厭禱邪神牽引未得其福但受其殃先亡牽引亦名橫死九者有病不治又不修福湯藥不順針灸失度不值良醫為病所困於是滅亡又信世間妖孽之師為作恐動寒熱言語妄發禍所犯者多心不自正不能自定卜問覔禍殺䐗狗牛羊種種衆生解奏神明呼諸魍魎鬼神請乞福祚欲望長生終不能得愚癡迷惑信邪倒見死入地獄展轉其中無解脫時是名九橫涅槃亦說有九橫死者彼經純約夭壽者言之具如第二十四卷經攝受親因如佛敕文殊將呪往護阿難親因也注即前文云下此以心呪釋呪心沇疏大同彼云從如來藏心之所流出故名呪心又云或是十方如來心印法門故曰呪心亦是祕密藏中下此取呪中精要釋呪心故智者說心有三種一慮知心二草木心三積聚精要心今祕密藏是積聚之義呪心即精要心也蜾螺之呪螟蛉者爾雅云蜾螺蒲盧即細腰蜂也俗呼為蠮螉螟蛉桑蟲俗謂之柔蟃亦曰女戎楊子曰螟蠕之了殪而逢蜾螺祝之曰類我類我久則肖之矣有云下節疏所解此用藏法師心經疏義若據初心得益多分可然至論圓法所生必無互闕義未盡理故曰下往如之二若我下結示二汝等下約因人以勸持分二一略勸二廣示初又二一勸受持二阿難下令書寫二阿難下廣示為三一總標二若我下別示分二一救護世間得大無畏二成就衆生出世間智初為六一免毒害經厭蠱者應法師云厭鬼名也字苑云厭眠內不祥也蒼頡篇云伏合人心曰厭說文云蠱腹中蟲謂蟲行毒也聲類作戈者反謂蟲物害人也正法華經有蠱狐舊維摩經有妖蠱應師並同聲類音之今但音古磣心者磣或作墋通俗文云沙土入食中也二毗那下獲靈祐經那由他者此當萬億俱胝者此當千萬見應師音義金剛藏王者慈恩翻首楞嚴為金剛藏然則此諸菩薩證此定故以是為名三從下遠惡趣經富單那一云息餓迦吒富單那此云奇臭餓鳩槃荼等如第六卷經如惡義聚者谷響云喻與諸佛無分散也四是故下滅罪障經五辛如下文經五逆者珙鈔引俱舍頌曰約處唯除北約人除扇𢮎敕皆反四身一語業三殺一虗誑一殺生加行無間一劫熟隨罪增苦增八比丘分二以為所破僧云云五復次下滿願隨求六阿難下銷災厄注支提翻靈廟或名可供養處又云有舍利曰塔無舍利曰支提如阿含中有四支徵知荷切謂佛生處得道轉法入滅也脫闍幢也者此乃梵語翻為幢也闍應作視遮切有作都音引爾雅云闍謂之臺而言脫者積土脫落也今所不取經五穀者周官曰以五穀養其病鄭注云麻黍稷麥豆也八大惡星者纂要云九執曜除日月取計都為八也孔經云日月及熒惑辰歲并太白鎮及羅睺彗此皆名執曜此與長水注同由旬者正言踰繕那此云合應計合爾許度量也或云此無正翻乃是輪王巡狩一停之舍猶如此方館驛然彼由旬數有大小或四十里或二十里諸經論中多用小數耳二是故下成就衆生出世間智三汝及下結勸經諸修行下具四緣故方獲其益謂依我壇場一如法持戒二所受戒主逢清淨僧三於此呪心不生疑悔四噫持此呪者當自惟念於是四緣為全為缺苟初緣未具第三罔知而持戒不疑能無自勵每讀至此傷病盈懷雖口誦之惟勤且心通而弗逮焉知來者不如經乎勉之勉之三說是下護持分六一金剛衆二梵釋衆三鬼衆四天衆五雜衆經無色界天同時稽首中陰經亦云無色界天禮拜世尊華嚴云菩薩鼻根聞無色界宮殿之香仁王云無色界天雨諸香華阿含中說舍利弗入滅時無色天空中淚下如春細雨故知無色非無色也昔入偏計豈唯暗大亦昧小宗而涅槃云非二乘所知者非全不知蓋言未了細色之相故六爾時下菩薩衆經除彼發心樂修禪者謂諸小鬼神心既悛惡可近善人注若涅槃殺一闡提等谷響引彼經云殺一蟻子得罪殺一闡提無罪法華中羅剎女說偈云若不順我呪惱亂說法者頭破作七分如阿梨樹枝涅槃明如來往世為王名曰仙豫因五百婆羅門不信大乘王盡殺之由謗法故墮地獄中既而乃起三念知是地獄知由謗法知因王殺改心自責即捨地獄生露鼓王佛剎得一劫之壽舊譯華嚴明善財至滿幢城滿足王所見無量衆生犯王法者身被五縛或斷手足或截耳鼻或挑雙目或斬身首或投沸灰或㲲纏身以油灌而焚之善財問曰云何修道答言我成就菩薩幻化三昧十惡衆生不可教化我為調伏化作苦治令捨惡具善得樂發心具一切智知知我於蟻子不生害心何況人耶唐譯名無厭足王云云一子地者慈念衆生猶如一子故涅槃明四等成就住二地慈悲喜住一子地捨住空平等地云云三阿難下示楞嚴地位分四一述請經未到涅槃者謂究竟涅槃即妙覺所證也至何漸次得修行目此問入地之正行也準下三種漸次初則除其助因所謂五辛未為正行至于第二刳其正性所謂淫心由是之故修三摩提能得第三違其現業乃至獲無生忍所以第二漸次名為真修即修行之目也應知涅槃如所到之境諸地如所由之道修行如能履之步三法若具則首楞嚴教能事方畢美矣哉阿難請意也如此二爾時下讚許三阿難下受教經刳心者谷響引莊子曰夫道覆載万物者也洋洋乎大哉君子不可以不刳心焉注刳猶去也此取郭象意注之彼云有心則纍其自然故當刳而去之釋文刳口吳口侯二反去起呂反四佛言下正說為三一略明二廣示三釋疑初又二一理絶名相二因妄下事分真妄經二轉依號沇疏云由不了一法界相忽然起妄名為不覺翻此不覺了本無生名之為覺即菩提之號因不覺立也由迷有生生即有滅翻此生滅顯不生滅即涅槃之號對生滅立也生滅既滅更無所依故名轉依以真如為迷悟依轉此迷依以為悟依故名轉依云云節疏先依法相釋即今注文也後約起信釋即引沇疏也然轉依名義正出相宗故集解之略采其說注六種轉依此約位辨慤疏有之二阿難下廣示分二一約迷真起二顛倒成十二類生二約斷妄修三漸次入五十七位初又二一總示倒因二別明倒相初又二一標列注今世界顛倒蓋指正報者問此與衆生顛倒云何辨異答衆生乃合前業果總明其相世界即於衆生中別明其類以世界是遷流分段差別義故若知總別不昧下文二阿難下牒示經本此無住等如淨名云從無住本立一切法也二別明倒相分二一衆生顛倒二世界顛倒初又二一迷真有相注除真如外至皆屬於權出法華疏記有身故生等即四念處境四攝五陰無法不收皆言非者謂身受心法悉是非相也何則由非真求復既是逆修乃能成於九界五陰斯皆虗妄之相故云非也問何故以生為身以住為受答如云卵生等既是色質豈非身耶苦受等領納現境對三相論之即是住相又約四念處次第配之義當於受故此釋也二展轉下熏業資生經相滅相生相字平聲證真作去呼者非注斯即前文業果相續者然此正明衆生顛倒已是前文衆生相續今指業果同其衆生耳淫欲故相生殺盜故相滅者亦可云異見成憎故相滅同想成愛故相生二阿難下世界顛倒分二一立世界二三世下辨類生為三一總標注古師用此如第三記二是故下正辨分三一因注此就聲塵當體為因者以動之一字不對餘塵說故若更就當體分之則動為其因聲如其果從因聲有色下皆以餘塵為因遞相為果也以顯六亂之相者不同十二因緣次第之義故當知展轉相因雖有十二而但云六亂者正顯相根塵各從其類兩兩相望雜亂而起二乘此下果注動念為初此指下文動顛倒也情愛後起即欲顛倒也異愛不同即趣假二類未顯經意者未如瑜伽顯示四生次第之意卵唯想生至化以離應如第四卷解細尋下文義則不然者若云四生為總八類為別此應可爾而於胎卵二生分為八類此必不然且如有想是神鬼靈類何故從卵生開出耶有色是休咎精明何須於胎生開出耶余之六類皆無定義四生頌者人傍生具四地獄及諸天中有唯化生鬼通胎化二云云三阿難下類分十二一動類經八万四千者孤山云將非八万四千煩惱塵勞為其種乎然此類生以因感果微細行相唯聖盡明止在總知唯妄所為未可委究歷事義趣不能已已且依古釋彼文多引沇節二疏羯邏藍餘經或名歌羅邏此云凝滑或云雜穢狀如凝酥注入胎位準俱舍論胎中分位有五如第四卷注二欲類經遏蒱曇此云疱狀若瘡疱三趣類經蔽尸即第三位問何故動類唯指初位欲類但言第二趣類止云蔽尸從假類去皆謂羯南耶答若有初位必具後位若有第二必具初後經文一往次第且取一位配之今蔽尸羯南既不入胎故無前位然而蔽尸須至羯南羯南或由蔽尸一往之意如前可會又假類而下雖皆云羯南其中非無具前三位及第五位即鉢羅奢佉此云形位良由第五於諸類中闕具不定唯有第四其名最通故障類等俱云羯南也注翻覆者飛伏之貌此約形說謂飛動而伏走也沇疏云違心背信翻覆任精遂感此類飛走不定蠛者上莫結切下莫孔切郭注爾雅云小蟲似蚋喜亂飛莊子謂之醯雞昆蟲者鄭注祭統云溫生寒死之蟲也四假類注蠐螬蟲谷響引爾雅云蟦扶云切蠐螬注曰在糞土中列子云烏足之根為蠐螬其葉為胡蝶根本也葉散也言烏足為蠐螬之本其本末散化而為胡蝶也天地委蛻者列子云了孫非汝有是天地之委蛻氣自委結而蟬蛻耳若是汝有則男女多少亦當由汝也又莊子云聖人之生也天行其死也物化郭象曰行謂任自然而運動物化謂蛻然無所係也請觀上文豈非以形化取譬於蛻耶下文純想則飛謂輕舉之相若飛騰之貌何須有翼方曰飛耶理合在茲者若云化相不同化生更指何類為無而忽有之化乎況四生次第與諸經不殊不應局說小蟲頓乖大義五障類經和合著成著陟慮切明也注爝火者沇師意謂螢火之類耳據莊子曰日月出矣而爝火不息其於光也不亦難乎釋文曰爝音爝然火也一云摧火謂小火也字林云爝炬火也斯等皆與螢火不同蚌珠者後漢書云珠蚌中陰精也六惑類經無色羯南問既云無色何謂羯南答應取一分細色通名其類不可責同堅硬之狀當知此亦化生之類而節公判為胎生開出者其可得乎空散銷沉者證真云通取四空也七影類經罔象猶云仿像蓋不真之貌也若莊子云水有罔象釋文曰水神名八癡類注華表生精黃頭化石谷響云晉張華字茂先時燕昭王墓有妖狐謂華表曰我聞張司空多學欲往干之以為如何對曰張司空博物君子也非但損子亦禍於吾狐不聽刺投華華與論天下人物多為其所折謂華曰天欲雨請辭去華固留之謂左右曰我聞巢居知風穴居知雨不是狐狸即是老鼠乃密令人斫華表然而照之化為狐狸而去梵云劫毗羅此翻黃頭頭如金色因以為名恐身死往自在天問天令於頻陀山取甘子食可延命食已於林中化為石如牀有不逮者書偈問石後為陳那菩薩斥之其石裂矣九僞類經水母者谷響云俗謂之蝦蛇是也切韻曰蛇水母也一名蟦形如羊胃元無目以蝦為目十性類注以聲附卵孤山引顯識論云雌孔聞雄者鳴於是有身彼謂之聲生也又莊子云蟲鳴於上風雌應於下風而風化注曰蟲以鳴聲相應不待合而便生子故曰風化十一罔類注蒸嘗者祭名也爾雅云春祭曰祠祠之言食夏祭曰礿新可約秋祭曰嘗嘗新穀也冬祭曰蒸進品物也十二殺類經土鳥者見爾雅注說文云梟不孝鳥也毛詩草木疏云流離鳥也自關而西謂鳥為流離其子適大還食其母破鏡者述異記云獍之為獸狀如虎豹而小始生還食其母故曰梟獍然則破鏡是獸明矣故孤山指譯人誤云鳥耳舊疏皆作鳥字釋之或曰凡鳥獸眼睛破者皆名破鏡未詳所據注貙者敕俱切爾雅云貙獌音萬似貍注曰今山民呼貙虎之大者為貙犴音岸三是名下結示注幽顯可驗者幽如鬼神精靈等顯如魚鳥龜蛇等下文廣談七趣者此中生數雖多起相則略若以七趣一斯觀此十二類生猶闕地獄修羅二趣然餘五趣亦未委明大槩但言迷真起妄故有類生破妄顯真故有諸位迷悟相翻意在於悟從悟說位用酬前文阿難之請也起第八卷三約斷妄修三漸次入五十七位分三一明漸次二示地位三顯經名初又二一結前生後二列名釋相初又二一結前顛倒注一則現起名事造謂十二顛倒交互而起正如揑目亂華發生也餘則冥伏名理具者以無始熏習顛倒性成此如種子冥伏在地也故唯識宗說第八識集諸種子起諸現行即其義焉然此冥伏合是妄具而云理具者以妄本無體下釋之此兼種義且約真妄相即作如是釋其實真心本具性惡不由熏成方是一家理具之義二汝今下生後漸次二云何下列名釋相又二一列名經除其助因除即斷也五辛是淫恚助發之因故先斷之刳其正性者刳猶去也淫殺等心是衆生正業之性故常去之如圓覺云卵胎濕化皆因淫欲而正性命此義同焉違其現業者由前漸次助修正行能破六根現前惑業也應知第三更無他法是故於此別名增進注事漸理圓者斷辛持戒從粗至細破惑入位自淺由深事雖有漸而皆以菩提之心即理而修無非圓行今此第二正名修行者以持聲聞菩薩戒律是無漏之學不同斷辛但除葷食故標真修簡前修習也二云何下釋相分三一除其助因乃至三違其現業初又三一標二阿難下釋為二一通明四食二別斷五辛初又二一示名體經是故佛說下證真云佛初出家於外道邊六年苦行日食麻麥知其非道遂即捨之於牧牛女邊受乳糜食外道聞之生謗佛成道後為除自餓外道無益苦行乃說一切衆生皆依食位正覺正說余不能知外道嗤曰愚者亦知何言正覺正知佛反問之食有幾種外不能答因說四食云云注段謂形段者古翻經律多云摶食其義則局如漿飲等不可摶故於是後譯皆言段食也相應觸及相應思者皆心所遍行中法也沇疏云思想飲食令人不死亦名思食冷暖等觸亦名觸食此乃分通非正食義二阿難下明損益二是諸下別斷五辛為二一正斷注應法師下彼又云興渠出烏茶娑他那國彼人常所食者也此方相傳為藝薹者非又云此是樹汁西國取之以置食中今阿魏是也孤山云當知此五辛而復葷是以制之故請觀音云五辛能葷悉不得噉若辛而不葷則非所制如薑芥之屬二如是下顯過又二一說法昭嫌二是食下修禪致毀三阿難下結二云何下刳其正性分三一標二阿難下釋為二一持戒律二成功用初又二一約性遮正防身口二依小大具執身心初又二一勸持注律中五果者一核果如棗杏等二膚果如蓽茇桑椹梨奈等三殼果如椰子胡桃石榴等四𥢶果如香菜蘇荏等五角果如大小豆等防壞生者壞音怪毀也以比丘之法不得自手壞生若有所須語淨人言汝知是汝看是等淨人解者以火觸之此名火淨律中更有爪淨揉淨等今且言火耳沇疏云以細況粗生果尚須淨食何況食肉傷慈之甚二阿難下誡犯於四重中略誡前二又於二中偏誡淫欲是知刳性之意斯為本歟法華云諸苦所因貪欲為本若滅貪欲無所依止智論云世間無不愛樂五欲於五欲中觸為第一能繫人心如人墮在深泥難可救濟復次若受餘欲猶不失智慧淫欲會時身心荒迷無所省覺深著自沒是故出家法中淫戒在初今經最後垂範而序中起教以此為別緣至今修行以此為偏誡願諸有學勿輕聖言二先持下依小大具執身心經先持聲聞下沇疏云如十輪經學行次第若不先學小乘即學大乘無有是處乃至云無力飲河池詎能吞大海後行菩薩清淨律儀即梵網所制也亦應如地持及瓔珞所說三聚戒相謂攝律儀戒十波羅蜜攝善法戒八萬四千法門攝衆生或慈悲喜捨具在菩薩戒疏注尼復加四謂第五不得染心男身相觸六不得染心男捉手捉衣入屏處屏處共立共語共行身相倚共期等八事七不得覆他重罪八不得隨舉大僧供給衣食云云衆法絶分者四人已上凡作羯磨不任僧用故四分偈云諸作惡行者猶如彼死尸衆所不容受以此當持戒二禁戒下成功用為二一破業纍注不淫等以相生相殺等如次配于四重亦可無相負纍及不還宿債皆由不偷劫也但上句在因下句屬果并前淫殺不行即無三種相續二是下發神通經得大神通遊十方界者別而言之此屬身根即如意通也若總說者六根清淨皆名神通故智者指法華并普賢觀及菩薩處胎經皆以六根而為六通然則他心宿命漏盡同是意根淨也三是則下結三云何下違其現業分三一標二釋為三一因戒成違二由違入證三從證立位初又二一因前刳性孤山云三漸次位有超有次前是超入故淨六根此是次入故但伏惑今謂不爾既名為漸那忽有超應知此中躡前六根淨人粗垢已落而細惑未除故曰於外六塵不多流逸二因不下成今違業二十方下由違入證又二一顯證相經琉璃譬國土明月喻真性獲大安隱即涅槃也大經云三德具足名大涅槃皆現其中者謂極果之德入分真之性也二是人下示忍名經無生法忍者謂忍可印持決定無繆即能證智也無生法從所斷惑得名若約所證亦名寂滅忍故荊溪云惑滅故名無生證理故名寂滅又淨名疏云通證無生忍秪是寂滅忍在因讓果說為無生三從是下從證立位三是則下結注豈不以違其現業等夫現業之體既屬無明非中道正觀無以違也圓人所修尚無先空次假之理何有斷辛而不持戒豈有持戒而不修中當知三種漸次說有先後若得意者同時而修也故第一漸次即云修菩提者菩提名覺非中觀而何又下文總結諸位云如是皆以三增進故善能成就五十五位真菩提路以此明之孤山云事漸理圓猶是一往耳此下乾慧地等亦是順經次第以第二漸次始入乾慧乃至十信第三漸次方入初住乃至行向等
